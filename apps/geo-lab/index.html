    ba.innerHTML=`<div class="mb m"><div class="mnum">${mastStep+1}</div><div class="mtxt">${st.prompt} <button class="tts-btn" onclick="event.stopPropagation();speak(window._mastPrompt,this)" aria-label="Read aloud">🔊</button></div></div>
      <div class="card"><div class="cw"><button class="cbtn bck" onclick="exitMast()">← Back</button><button class="cbtn sbtn" onclick="showMastBrief()">Mission</button>
      <button class="cbtn clr" onclick="qPts=[];qSegs=[];qSel=-1;qComplete=false;drawQuadGrid()">Clear</button>
      <div class="bc"><svg id="svg" viewBox="0 0 440 300"></svg></div></div></div>
      <div class="msc" style="text-align:center">${c.name} — Step ${mastStep+1} of ${c.mastery.length}</div>`;
    setupQuadGrid();drawQuadGrid();
    setTimeout(showMastBrief,120);
  }else if(st.type==='quiz'){showMastQuiz(st,c)}
}

function showMastBrief(){
  if(!mastTgt)return;
  const c=ALL.find(x=>x.id===mastTgt),st=c.mastery[mastStep];
  if(!st||st.type==='quiz')return;
  const spr=spriteFor(c.id);
  window._mastPrompt=st.prompt.replace(/<[^>]*>/g,'');
  window._mastTip=masteryTip(st);
  modalOpen=true;
  document.getElementById('ovc').innerHTML=`<div class="msc">Mission Brief</div>
  <div class="spr-wrap">
    <div class="spr-char">${spr.emoji}</div>
    <div class="spr-bub">
      <div class="spr-name">${spr.name}</div>
      <div class="spr-text">${window._mastPrompt}</div>
      <div style="margin-top:.35rem;font-size:.72rem;color:var(--t2)">${window._mastTip}</div>
    </div>
  </div>
  <button class="btn gld" onclick="stopSpeak();document.getElementById('ov').classList.remove('on');modalOpen=false">Let me try</button>
  <button class="btn sec" onclick="stopSpeak();speak(window._mastPrompt+'. '+window._mastTip)">Read it aloud</button>`;
  document.getElementById('ov').classList.add('on');
}

function showMastQuiz(st,c){
  let ans=false;
  modalOpen=true;
  window._mastQ=st.q.replace(/<[^>]*>/g,'');
  document.getElementById('ovc').innerHTML=`<div class="msc">${c.name} — Step ${mastStep+1} of ${c.mastery.length}</div><div class="qq">${st.q} <button class="tts-btn" onclick="event.stopPropagation();speak(window._mastQ,this)" aria-label="Read question">🔊</button></div><div class="qo" id="qO"></div><div class="qf" id="qF"></div><button class="btn" id="qN" disabled>Next</button>`;
  const el=document.getElementById('qO');
  st.opts.forEach(o=>{
    const d=document.createElement('div');d.className='qi';
    d.innerHTML=`<svg viewBox="0 0 50 50">${o.svg}</svg><div class="ol">${o.l}</div>`;
    d.onclick=()=>{if(ans)return;ans=true;const fb=document.getElementById('qF');
      if(o.c){d.classList.add('correct');fb.textContent='Correct!';fb.className='qf corfb'}
      else{d.classList.add('wrong');fb.textContent='Not quite.';fb.className='qf wrfb';el.querySelectorAll('.qi').forEach((x,i)=>{if(st.opts[i].c)x.classList.add('correct')})}
      document.getElementById('qN').disabled=false};
    el.appendChild(d);
  });
  document.getElementById('qN').onclick=()=>{stopSpeak();document.getElementById('ov').classList.remove('on');modalOpen=false;advMast()};
  document.getElementById('ov').classList.add('on');
}

function showCFB(t,txt){const cw=document.querySelector('.cw');if(!cw)return;const old=cw.querySelector('.cfb');if(old)old.remove();const el=document.createElement('div');el.className='cfb '+t;el.textContent=txt;cw.appendChild(el);setTimeout(()=>el.remove(),2000)}

// ==================== RENDER ====================
function renderDisc(){
  const ba=document.getElementById('ba');removeExtArrows();
  let nav='<div class="tnav">';
  TIERS.forEach(t=>{const o=tierOpen(t.id),cl=tierCleared(t.id);let cls='tbtn';if(t.id===curTier)cls+=' active';if(!o)cls+=' locked';if(cl)cls+=' cleared';nav+=`<button class="${cls}" onclick="if(!${o})return;curTier='${t.id}';renderDisc();renderDex();updProg()">${!o?'🔒 ':cl?'✓ ':''}${t.name}</button>`});
  nav+='</div>';
  if(curTier==='t1'){
    gPts=[];gSegs=[];gSel=-1;challengeSeg=null;
    ba.innerHTML=nav+`<div class="hint">Place points, connect segments, extend into rays & lines. Discover concepts as you build! <button class="tts-btn" onclick="event.stopPropagation();speak('Place points, connect segments, extend into rays and lines. Discover concepts as you build!',this)" aria-label="Read aloud">🔊</button></div><div class="card"><div class="cw"><button class="cbtn clr" onclick="gPts=[];gSegs=[];gSel=-1;hoverPtIdx=-1;drawGrid()">Clear</button><div class="bc"><svg id="svg" viewBox="0 0 440 300"></svg></div></div><div class="cr" id="cR"></div></div>`;
    setupGrid();drawGrid();
  }else if(curTier==='t2'){
    if(!tierOpen('t2')){ba.innerHTML=nav+`<div class="card" style="text-align:center;padding:2rem"><p style="font-size:2rem;margin-bottom:.5rem">🔒</p><h3 style="color:var(--t2)">Locked</h3><p style="color:var(--t3)">Master all Foundations to unlock.</p></div>`;return}
    protRays=[];protVertex=false;protSelRay=-1;protWaitingForArc=false;
    ba.innerHTML=nav+`<div class="hint">Tap the vertex, then tap the arc to build a ray. Repeat to build a second ray and form an angle! Tap a handle to move it.</div><div class="card"><div class="cw"><button class="cbtn clr" onclick="protRays=[];protVertex=false;protSelRay=-1;protWaitingForArc=false;drawProt()">Clear</button><div class="bc nocur" style="min-height:320px"><svg id="svg" viewBox="0 0 440 320" style="height:320px"></svg><div class="angle-readout" id="angRead">—</div><div class="angle-type none" id="angType">Place rays</div></div></div><div class="cr" id="cR"></div></div>`;
    setupProt();drawProt();
  }else if(curTier==='t3'){
    if(!tierOpen('t3')){ba.innerHTML=nav+`<div class="card" style="text-align:center;padding:2rem"><p style="font-size:2rem;margin-bottom:.5rem">🔒</p><h3 style="color:var(--t2)">Locked</h3><p style="color:var(--t3)">Master all Angles to unlock.</p></div>`;return}
    triAngA=null;triAngB=null;triSelVert=null;
    ba.innerHTML=nav+`<div class="hint">Tap vertex A, then the arc to set its angle. Then tap vertex B and set its angle. The rays will meet to form a triangle!</div><div class="card"><div class="cw"><button class="cbtn clr" onclick="triAngA=null;triAngB=null;triSelVert=null;drawTri()">Clear</button><div class="bc nocur" style="min-height:360px"><svg id="svg" viewBox="0 0 440 400" style="height:360px"></svg><div class="angle-readout" id="triRead">—</div><div class="angle-type none" id="triType">Set angle at A</div></div></div><div class="cr" id="cR"></div></div>`;
    setupTri();drawTri();
  }else if(curTier==='t4'){
    if(!tierOpen('t4')){ba.innerHTML=nav+`<div class="card" style="text-align:center;padding:2rem"><p style="font-size:2rem;margin-bottom:.5rem">🔒</p><h3 style="color:var(--t2)">Locked</h3><p style="color:var(--t3)">Master all Triangles to unlock.</p></div>`;return}
    qPts=[];qSegs=[];qSel=-1;qComplete=false;
    ba.innerHTML=nav+`<div class="hint">Place 4 points on the grid and connect them to build quadrilaterals. Discover shapes by their special properties! <button class="tts-btn" onclick="event.stopPropagation();speak('Place 4 points on the grid and connect them to build quadrilaterals. Discover shapes by their special properties!',this)" aria-label="Read aloud">🔊</button></div><div class="card"><div class="cw"><button class="cbtn clr" onclick="qPts=[];qSegs=[];qSel=-1;qComplete=false;drawQuadGrid()">Clear</button><div class="bc"><svg id="svg" viewBox="0 0 440 300"></svg></div></div><div class="cr" id="cR"></div></div>`;
    setupQuadGrid();drawQuadGrid();
  }
  renderComp();document.getElementById('tierLabel').textContent=TIERS.find(t=>t.id===curTier).name;
}
function renderComp(){const el=document.getElementById('cR');if(!el)return;el.innerHTML='';tierConcepts().forEach((c,i)=>{if(!disc.has(c.id))return;const m=mast.has(c.id);const ch=document.createElement('div');ch.className='chip '+(m?'mast':'disc');ch.style.animationDelay=i*.05+'s';ch.innerHTML=`<svg viewBox="0 0 80 80">${c.icon}</svg>${c.name}${m?' ✓':''}`;el.appendChild(ch)})}
function renderDex(){
  const l=document.getElementById('dList');l.innerHTML='';
  const discovered=disc.size,total=ALL.length;
  const dxh=document.querySelector('.dxh p');
  if(dxh)dxh.textContent=`${discovered}/${total} discovered • ${mast.size}/${total} mastered`;
  TIERS.forEach(t=>{const o=tierOpen(t.id);const lbl=document.createElement('div');lbl.className='dxtl';lbl.textContent=t.name+(o?'':' 🔒');l.appendChild(lbl);
    t.concepts.forEach(c=>{const d=disc.has(c.id),m=mast.has(c.id);const el=document.createElement('div');el.className='de '+(m?'mast':d?'disc':'locked');
      const spr=spriteFor(c.id);
      el.classList.add('collect');
      // Always show real icon and name; sprite appears only when mastered
      let spriteHtml='';
      if(m) spriteHtml=`<div class="sprite">${spr.emoji}</div>`;
      else if(d) spriteHtml=`<div class="sprite">❔</div>`;
      const sub=m?`${spr.name} captured!`:d?`${spr.name} waiting to be captured`:'Undiscovered';
      const badge=m?'<span class="ds m">Captured</span>':d?'<span class="ds d">Claim</span>':'';
      el.innerHTML=`<div class="di"><svg viewBox="0 0 80 80">${c.icon}</svg></div>${spriteHtml}<div style="flex:1;min-width:0"><div class="dn">${c.name}</div><div class="dd">${sub}</div></div>${badge}`;
      if(d&&!m)el.onclick=()=>startMast(c.id);l.appendChild(el)})})
}
function updProg(){const tc=tierConcepts(),tm=tc.filter(c=>mast.has(c.id)).length;document.getElementById('pTxt').textContent=`${tm}/${tc.length}`;document.getElementById('pFill').style.width=`${(tm/tc.length*100).toFixed(1)}%`;document.getElementById('fCnt').textContent=`${mast.size} mastered`}

function devSkip(){
  // Master T1, T2, T3, jump to T4
  TIERS.forEach(t=>{
    if(t.id==='t1'||t.id==='t2'||t.id==='t3'){
      t.concepts.forEach(c=>{disc.add(c.id);mast.add(c.id)});
    }
  });
  curTier='t4';
  mode='discovery';mastTgt=null;mastStep=0;
  document.getElementById('modeLabel').textContent='Discovery';document.getElementById('modeLabel').className='ml disc';
  renderDisc();renderDex();updProg();
}
renderDisc();renderDex();updProg();
</script>
</body>
</html>
