<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Geo Lab</title>
<style>
:root{
  --bg:#FFF;--bg2:#F5F5F7;--bg3:#FAFAFA;--surface:#FFF;
  --border:#E5E5EA;--bl:#F0F0F2;
  --t1:#1D1D1F;--t2:#6E6E73;--t3:#AEAEB2;
  --acc:#007AFF;--accl:rgba(0,122,255,.08);
  --grn:#34C759;--grnl:rgba(52,199,89,.08);
  --org:#FF9500;--orgl:rgba(255,149,0,.08);
  --red:#FF3B30;--pur:#AF52DE;--purl:rgba(175,82,222,.08);
  --gld:#FF9F0A;--gldl:rgba(255,159,10,.06);
  --f:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',system-ui,sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);--spring:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg2);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.top{background:rgba(255,255,255,.72);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:.5px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:100}
.top h1{font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
.top h1 span{background:linear-gradient(135deg,var(--gld),#FF6B00);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pw{flex:1;max-width:240px;min-width:80px}
.pm{display:flex;justify-content:space-between;font-size:.68rem;font-weight:500;color:var(--t3);margin-bottom:2px}
.pt{height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.pfl{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gld),#FF6B00);transition:width .6s var(--ease);width:0%}
.fc{font-size:.78rem;font-weight:600;color:var(--gld);white-space:nowrap}
.ml{font-size:.62rem;font-weight:700;padding:.18rem .5rem;border-radius:999px;text-transform:uppercase;letter-spacing:.08em}
.ml.disc{background:var(--accl);color:var(--acc)}.ml.mast{background:var(--gldl);color:var(--gld)}

.tnav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.tbtn{font-family:var(--f);font-weight:600;font-size:.75rem;border:1.5px solid var(--border);background:var(--surface);color:var(--t2);padding:.38rem .75rem;border-radius:999px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:5px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tbtn:hover:not(.locked){border-color:var(--acc);color:var(--acc)}
.tbtn.active{background:var(--t1);border-color:var(--t1);color:#FFF}
.tbtn.locked{opacity:.35;cursor:not-allowed}
.tbtn.cleared{border-color:var(--grn);color:var(--grn)}
.tbtn.cleared.active{background:var(--grn);border-color:var(--grn);color:#FFF}

.app{display:grid;grid-template-columns:1fr 260px;height:calc(100vh - 52px)}
@media(max-width:800px){.app{grid-template-columns:1fr;height:auto}.dex{max-height:36vh;border-left:none;border-top:.5px solid var(--border)}}
.ba{padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.75rem}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:16px;padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}

.mb{border-radius:12px;padding:.75rem .9rem;display:flex;align-items:center;gap:.7rem;animation:si .4s var(--spring) both}
.mb.d{background:var(--accl);border:1.5px solid rgba(0,122,255,.15)}
.mb.m{background:var(--gldl);border:1.5px solid rgba(255,159,10,.2)}
@keyframes si{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mnum{width:28px;height:28px;border-radius:50%;background:var(--acc);color:#FFF;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.mb.m .mnum{background:var(--gld)}
.mtxt{font-size:.88rem;font-weight:500;line-height:1.4}.mtxt b{font-weight:700}

.cw{position:relative}
.bc{background:var(--bg);border:.5px solid var(--border);border-radius:12px;min-height:300px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:default}
.bc svg{width:100%;height:300px}
.bc.nocur{cursor:default}
.cbtn{position:absolute;font-family:var(--f);font-size:.68rem;font-weight:600;color:var(--t3);background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border:.5px solid var(--border);border-radius:999px;padding:.25rem .6rem;cursor:pointer;transition:all .2s;z-index:5}
.cbtn:hover{color:var(--acc);border-color:var(--acc)}
.cbtn.clr{top:8px;right:8px}.cbtn.clr:hover{color:var(--red);border-color:var(--red)}
.cbtn.bck{top:8px;left:8px}

.cr{display:flex;gap:5px;flex-wrap:wrap;margin-top:.5rem}
.chip{display:flex;align-items:center;gap:3px;border-radius:999px;padding:.18rem .5rem .18rem .3rem;font-size:.68rem;font-weight:600;animation:pop .35s var(--spring) both}
.chip.disc{background:var(--accl);border:1px solid rgba(0,122,255,.15);color:var(--acc)}
.chip.mast{background:var(--grnl);border:1px solid rgba(52,199,89,.2);color:var(--grn)}
.chip svg{width:14px;height:14px}
.hint{font-size:.75rem;color:var(--t3);text-align:center;padding:.4rem;line-height:1.4}

.dex{background:var(--surface);border-left:.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.dxh{padding:.75rem .85rem;border-bottom:.5px solid var(--border)}
.dxh h2{font-size:.9rem;font-weight:700}.dxh p{font-size:.62rem;color:var(--t3);margin-top:.15rem}
.dxl{flex:1;overflow-y:auto;padding:.4rem .5rem}
.dxl::-webkit-scrollbar{width:3px}.dxl::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.dxtl{font-size:.6rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;padding:.5rem .4rem .15rem}
.de{display:flex;align-items:center;gap:.45rem;padding:.4rem .45rem;border-radius:9px;margin-bottom:2px;border:1px solid transparent;transition:all .2s;cursor:default}
.de.disc{border-color:var(--bl);background:var(--bg3);cursor:pointer}.de.disc:hover{border-color:var(--acc)}
.de.mast{border-color:rgba(52,199,89,.12);background:rgba(52,199,89,.02);cursor:pointer}.de.mast:hover{border-color:var(--grn)}
.de.locked{opacity:1}
.de.locked .di{background:var(--bg2);border-color:var(--border)}
.de.locked .di svg{filter:grayscale(1) opacity(.35)}
.de.collect{padding:.5rem;border-radius:12px;border-width:1.5px}
.di{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg2);border:.5px solid var(--bl)}
.de.disc .di{background:var(--accl);border-color:rgba(0,122,255,.12)}
.de.mast .di{background:var(--grnl);border-color:rgba(52,199,89,.12)}
.di svg{width:18px;height:18px}
.dn{font-size:.72rem;font-weight:600}.de.locked .dn{color:var(--border)}
.dd{font-size:.58rem;color:var(--t3);margin-top:1px}.de.locked .dd{color:var(--border)}
.ds{font-size:.55rem;font-weight:700;padding:.12rem .35rem;border-radius:999px;flex-shrink:0}
.ds.d{background:var(--accl);color:var(--acc)}.ds.m{background:var(--grnl);color:var(--grn)}
.sprite{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--border);font-size:14px;flex-shrink:0}
.de.disc .sprite{background:var(--accl);border-color:rgba(0,122,255,.2)}
.de.mast .sprite{background:var(--grnl);border-color:rgba(52,199,89,.3)}
.dexstat{font-size:.6rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:.35rem}
.de.mast.collect{box-shadow:0 6px 18px rgba(52,199,89,.08)}

.ov{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s}
.ov.on{opacity:1;pointer-events:auto}
.ovbg{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .4s}.ov.on .ovbg{background:rgba(0,0,0,.4)}
.ovc{position:relative;z-index:1;background:var(--surface);border-radius:22px;padding:1.75rem;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.12);transform:scale(.3) translateY(30px);transition:transform .55s var(--spring);max-width:420px;width:92%;max-height:85vh;overflow-y:auto}
.ov.on .ovc{transform:scale(1) translateY(0)}

.cel-badge{display:inline-block;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#FFF;background:var(--gld);padding:.18rem .6rem;border-radius:999px;margin-bottom:.5rem}
.cel-iw{width:72px;height:72px;margin:0 auto .5rem;border-radius:12px;background:var(--gldl);border:2px solid rgba(255,159,10,.15);display:flex;align-items:center;justify-content:center;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,159,10,.1)}50%{box-shadow:0 0 0 8px rgba(255,159,10,0)}}
.cel-iw svg{width:42px;height:42px}
.cel-nm{font-size:1.25rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.15rem}
.cel-sub{font-size:.72rem;color:var(--t3);margin-bottom:.5rem}

/* TEACH MODAL */
.teach-section{text-align:left;background:var(--bg2);border-radius:14px;padding:.9rem 1rem;margin:.6rem 0}
.teach-section h3{font-size:.82rem;font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
.teach-fact{display:flex;align-items:flex-start;gap:8px;margin-bottom:.5rem;font-size:.8rem;line-height:1.5;text-align:left}
.teach-fact:last-child{margin-bottom:0}
.teach-bullet{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:7px}
.teach-fact b{font-weight:700}

.qq{font-size:.9rem;font-weight:600;margin-bottom:.75rem;line-height:1.4}
.qo{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:.6rem}
.qi{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:.55rem;cursor:pointer;transition:all .2s;text-align:center}
.qi:hover{border-color:var(--acc)}
.qi.correct{border-color:var(--grn);background:var(--grnl);animation:cpop .3s var(--spring)}
@keyframes cpop{50%{transform:scale(1.04)}}
.qi.wrong{border-color:var(--red);background:rgba(255,59,48,.06);animation:shake .4s ease}
@keyframes shake{20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.qi svg{width:46px;height:46px;margin-bottom:3px}
.qi .ol{font-size:.72rem;font-weight:600}
.qf{font-size:.78rem;font-weight:500;padding:.35rem .6rem;border-radius:8px;margin-bottom:.5rem;display:none}
.qf.corfb{display:block;background:var(--grnl);color:var(--grn)}.qf.wrfb{display:block;background:rgba(255,59,48,.06);color:var(--red)}

.btn{font-family:var(--f);font-weight:600;font-size:.82rem;background:var(--t1);color:#FFF;border:none;padding:.5rem 1.3rem;border-radius:999px;cursor:pointer;transition:all .2s}
.btn:hover{transform:scale(1.04)}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.3;pointer-events:none}
.btn.grn{background:var(--grn)}.btn.gld{background:var(--gld)}.btn.sec{background:none;color:var(--t3);font-size:.75rem;border:none;margin-top:.4rem}
.msc{font-size:.58rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem}
.cfb{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:.78rem;font-weight:600;padding:.35rem .75rem;border-radius:999px;z-index:5;animation:si .3s var(--spring) both;pointer-events:none}
.cfb.ok{background:var(--grnl);color:var(--grn);border:1px solid rgba(52,199,89,.2)}

.angle-readout{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--surface);border:.5px solid var(--border);padding:.3rem .7rem;border-radius:10px;font-size:1.1rem;font-weight:700;color:var(--acc);box-shadow:0 4px 12px rgba(0,0,0,.06);z-index:5}
.angle-type{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:.82rem;font-weight:600;padding:.3rem .75rem;border-radius:999px;z-index:5;transition:all .3s}
.angle-type.acute{background:var(--accl);color:var(--acc)}
.angle-type.right{background:var(--purl);color:var(--pur)}
.angle-type.obtuse{background:var(--grnl);color:var(--grn)}
.angle-type.none{background:var(--bg2);color:var(--t3)}

@keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}

/* Pulsing extender arrow — rendered inside SVG now */

/* TTS speaker button */
.tts-btn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:14px;flex-shrink:0;transition:all .2s;padding:0;line-height:1;vertical-align:middle;margin-left:4px}
.tts-btn:hover{border-color:var(--acc);background:var(--accl)}
.tts-btn.speaking{border-color:var(--acc);background:var(--accl);animation:pulse 1s ease infinite}
.sbtn{position:absolute;top:8px;left:88px}

.spr-wrap{display:flex;align-items:flex-start;gap:.7rem;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:.7rem .8rem;margin:.6rem 0 1rem}
.spr-char{width:46px;height:46px;border-radius:12px;background:linear-gradient(145deg,#fff,#f7f7f9);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.spr-bub{flex:1;text-align:left;background:#FFF7E8;border:1px solid rgba(255,159,10,.3);border-radius:12px;padding:.55rem .65rem;position:relative}
.spr-bub:before{content:'';position:absolute;left:-6px;top:12px;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:6px solid rgba(255,159,10,.3)}
.spr-bub:after{content:'';position:absolute;left:-5px;top:12px;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:6px solid #FFF7E8}
.spr-name{font-size:.66rem;font-weight:700;color:var(--org);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem}
.spr-text{font-size:.82rem;line-height:1.35;font-weight:600}
/* Tier unlock celebration */
.tier-unlock-bg{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(255,159,10,.15),rgba(0,0,0,.7));z-index:998;animation:tierBgIn .6s ease both}
@keyframes tierBgIn{from{opacity:0}to{opacity:1}}
.tier-unlock-card{animation:tierCardIn .8s cubic-bezier(.34,1.56,.64,1) both;animation-delay:.3s}
@keyframes tierCardIn{from{opacity:0;transform:scale(.2) translateY(60px)}to{opacity:1;transform:scale(1) translateY(0)}}
.tier-trophy{font-size:4rem;animation:trophyBounce 1s ease infinite;display:block;margin-bottom:.3rem}
@keyframes trophyBounce{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-12px) rotate(-5deg)}75%{transform:translateY(-8px) rotate(5deg)}}
.tier-title{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--gld),#FF6B00,var(--grn));background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.25rem}
.tier-sub{font-size:.9rem;font-weight:600;color:var(--t2);margin-bottom:.3rem}
.tier-next{font-size:.78rem;color:var(--t3);margin-bottom:.8rem}
.tier-sprites{display:flex;justify-content:center;gap:8px;margin:.6rem 0;flex-wrap:wrap}
.tier-sprites .ts{width:44px;height:44px;border-radius:12px;background:var(--grnl);border:2px solid rgba(52,199,89,.2);display:flex;align-items:center;justify-content:center;font-size:22px;animation:tsIn .5s var(--spring) both}
@keyframes tsIn{from{opacity:0;transform:scale(0) rotate(-30deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
.tier-stars{font-size:1.8rem;letter-spacing:6px;margin:.3rem 0}
.tier-stars span{display:inline-block;animation:starSpin .6s var(--spring) both}
@keyframes starSpin{from{opacity:0;transform:scale(0) rotate(-180deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
</style>
</head>
<body>
<canvas id="pc" style="position:fixed;inset:0;z-index:999;pointer-events:none"></canvas>
<div class="ov" id="ov"><div class="ovbg"></div><div class="ovc" id="ovc"></div></div>
<div class="top">
  <h1><span>Geo Lab</span></h1>
  <div class="pw"><div class="pm"><span id="tierLabel">Foundations</span><span id="pTxt">0/8</span></div><div class="pt"><div class="pfl" id="pFill"></div></div></div>
  <div class="ml disc" id="modeLabel">Discovery</div>
  <div class="fc" id="fCnt">0 mastered</div>
  <button onclick="devSkip()" style="font-family:var(--f);font-size:.6rem;font-weight:600;background:var(--red);color:#FFF;border:none;padding:.2rem .5rem;border-radius:999px;cursor:pointer;opacity:.6">DEV SKIP</button>
</div>
<div class="app">
  <div class="ba" id="ba"></div>
  <div class="dex">
    <div class="dxh"><h2>Collection</h2><p>Discover concepts, then master them</p></div>
    <div class="dxl" id="dList"></div>
  </div>
</div>
<script>
const TIERS=[
{id:'t1',name:'Foundations',concepts:[
  {id:'point',name:'Point',
   icon:'<circle cx="40" cy="40" r="7" fill="#FF3B30"/><text x="50" y="31" font-size="11" fill="#FF6961" font-weight="600">A</text>',
   def:'An exact location in space — no size, just a position.',
   teach:{
     emoji:'📍',title:'What is a Point?',
     facts:[
       'A point marks an <b>exact location</b> in space.',
       'It has <b>no size at all</b> — no width, no height, no length. Zero dimensions!',
       'We draw it as a dot so we can see it, but a true point is infinitely small.',
       'Points are named with <b>capital letters</b>, like Point A or Point B.',
       'Every shape in geometry starts with points!'
     ]
   },
   mastery:[
     {type:'build',prompt:'Place <b>a point</b> on the grid.',detect:'point'},
     {type:'quiz',q:'Which one shows just a point?',opts:[
       {l:'A',svg:'<circle cx="25" cy="25" r="5" fill="#FF3B30"/><text x="32" y="22" font-size="9" fill="#FF6961" font-weight="600">P</text>',c:true},
       {l:'B',svg:'<line x1="8" y1="42" x2="42" y2="8" stroke="#007AFF" stroke-width="3" stroke-linecap="round"/><circle cx="8" cy="42" r="3" fill="#FF3B30"/><circle cx="42" cy="8" r="3" fill="#FF3B30"/>',c:false},
       {l:'C',svg:'<line x1="8" y1="42" x2="25" y2="8" stroke="#8E8E93" stroke-width="2.5"/><line x1="8" y1="42" x2="42" y2="42" stroke="#8E8E93" stroke-width="2.5"/>',c:false},
       {l:'D',svg:'<circle cx="25" cy="25" r="16" fill="none" stroke="#8E8E93" stroke-width="2.5"/>',c:false},
     ]},
     {type:'quiz',q:'A point has:',opts:[
       {l:'No size at all',svg:'<circle cx="25" cy="25" r="4" fill="#FF3B30"/>',c:true},
       {l:'Length',svg:'<line x1="8" y1="25" x2="42" y2="25" stroke="#8E8E93" stroke-width="3"/>',c:false},
       {l:'Width and height',svg:'<rect x="10" y="10" width="30" height="30" fill="none" stroke="#8E8E93" stroke-width="2"/>',c:false},
       {l:'A radius',svg:'<circle cx="25" cy="25" r="16" fill="none" stroke="#8E8E93" stroke-width="2"/>',c:false},
     ]},
   ]},
  {id:'line_segment',name:'Line Segment',
   icon:'<line x1="14" y1="60" x2="66" y2="20" stroke="#007AFF" stroke-width="4" stroke-linecap="round"/><circle cx="14" cy="60" r="4" fill="#FF3B30"/><circle cx="66" cy="20" r="4" fill="#FF3B30"/>',
   def:'A straight path between two endpoints — it starts and stops.',
   teach:{
     emoji:'📏',title:'What is a Line Segment?',
     facts:[
       'A line segment connects <b>two points</b> with a straight path.',
       'It has a <b>beginning and an end</b> — two endpoints.',
       'Unlike a line, a segment <b>does not go on forever</b>.',
       'You can <b>measure</b> a segment because it has a definite length.',
       'We name it by its endpoints: Segment AB or AB̅.'
     ]
   },
   mastery:[
     {type:'build',prompt:'Tap two points to <b>connect them with a segment</b>.',detect:'segment'},
     {type:'quiz',q:'How many endpoints does this figure have?',opts:[
       {l:'Two',svg:'<line x1="8" y1="35" x2="42" y2="15" stroke="#007AFF" stroke-width="3" stroke-linecap="round"/><circle cx="8" cy="35" r="3.5" fill="#FF3B30"/><circle cx="42" cy="15" r="3.5" fill="#FF3B30"/>',c:true},
       {l:'Zero',svg:'<line x1="2" y1="35" x2="48" y2="15" stroke="#8E8E93" stroke-width="2.5"/><polygon points="2,35 8,37 7,31" fill="#8E8E93"/><polygon points="48,15 42,13 43,19" fill="#8E8E93"/>',c:false},
       {l:'One',svg:'<circle cx="8" cy="35" r="3.5" fill="#FF3B30"/><line x1="8" y1="35" x2="48" y2="15" stroke="#8E8E93" stroke-width="2.5"/><polygon points="48,15 42,13 43,19" fill="#8E8E93"/>',c:false},

{id:'t2',name:'Angles',concepts:[
  {id:'degree',name:'Degree',
   icon:'<text x="18" y="55" font-size="36" fill="#FF9500" font-weight="700">°</text><path d="M 40 60 A 20 20 0 0 1 20 40" fill="none" stroke="#FF9500" stroke-width="3"/>',
   def:'The unit we use to measure angles — there are 360° in a full turn.',
   teach:{
     emoji:'🌡️',title:'What is a Degree?',
     facts:[
       'A <b>degree (°)</b> is the unit for measuring how much an angle opens — just like inches measure length, degrees measure rotation.',
       'Imagine standing and spinning in a <b>complete circle</b> back to where you started — that full turn is <b>360°</b>. Ancient mathematicians chose 360 because it divides evenly by so many numbers!',
       'A <b>half turn</b> (facing the opposite direction, a straight line) is <b>180°</b> — exactly half of 360.',
       'A <b>quarter turn</b> (like turning a corner) is <b>90°</b> — the square corner you see on books, screens, and doors.',
       'The little circle symbol <b>°</b> means degrees. So when you see 45°, it means the angle is <b>halfway between 0° (closed) and 90° (a square corner)</b>.',
       'Bigger numbers mean <b>wider openings</b>: 10° is barely open, 90° is a square corner, 170° is almost a straight line.'
     ]
   },

       'An angle is formed by <b>two rays</b> that share the same <b>endpoint</b>.',
       'That shared endpoint is called the <b>vertex</b>.',
       'We measure angles in <b>degrees (°)</b>.',
       'A <b>right angle</b> is 90°. A <b>straight angle</b> is 180°.',
       'Angles less than 90° are <b>acute</b>. Angles greater than 90° are <b>obtuse</b>.'
     ]
   },

{id:'t3',name:'Triangles',concepts:[
  {id:'polygon',name:'Polygon',
   icon:'<polygon points="40,8 68,28 58,62 22,62 12,28" fill="none" stroke="#FF9500" stroke-width="3" stroke-linejoin="round"/>',
   def:'A closed shape made of straight line segments — triangles, rectangles, and more are all polygons.',
   teach:{
     emoji:'🔶',title:'What is a Polygon?',
     facts:[
       'A polygon is a <b>closed, flat shape</b> made entirely of <b>straight sides</b>.',
       '"Poly" means <b>many</b> and "gon" means <b>angles</b> — many angles!',
       'A triangle (3 sides) is the <b>simplest polygon</b>. Then quadrilaterals (4), pentagons (5), hexagons (6), and so on.',
       'Circles are <b>NOT polygons</b> because they have curved sides, not straight ones.',
       'All the angles inside a polygon add up to a formula: <b>(n − 2) × 180°</b>, where n is the number of sides.'
     ]
   },

}

let gPts=[],gSegs=[],gSel=-1,challengeSeg=null;
const S=40,P=20;
const GRID_HIT_RADIUS=12;
const EXT_ARROW_OFFSET=30;
function sameP(a,b){return a.x===b.x&&a.y===b.y}
function gcd(a,b){while(b){const t=b;b=a%b;a=t}return a}
function segDir(s){const dx=s.b.x-s.a.x,dy=s.b.y-s.a.y,g=gcd(Math.abs(dx),Math.abs(dy))||1;let ux=dx/g,uy=dy/g;if(ux<0||(ux===0&&uy<0)){ux*=-1;uy*=-1}return{ux,uy}}
function segsIntersect(s1,s2){
  // Returns true if two segments actually cross (not just share endpoint)
  const p=segCrossPoint(s1,s2);
  return p!==null;
}
function segCrossPoint(s1,s2){
  const x1=s1.a.x,y1=s1.a.y,x2=s1.b.x,y2=s1.b.y;
  const x3=s2.a.x,y3=s2.a.y,x4=s2.b.x,y4=s2.b.y;
  const d=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
  if(Math.abs(d)<.001)return null;
  const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/d;
  const u=-((x1-x2)*(y1-y3)-(y1-y2)*(x1-x3))/d;
  if(t>0.01&&t<0.99&&u>0.01&&u<0.99){
    return{x:x1+t*(x2-x1),y:y1+t*(y2-y1)};
  }
  return null;
}
function findAllIntersections(){
  const pts=[];
  // Shared endpoints
  for(let i=0;i<gSegs.length;i++)for(let j=i+1;j<gSegs.length;j++){
    if(sameP(gSegs[i].a,gSegs[j].a)||sameP(gSegs[i].a,gSegs[j].b))pts.push({...gSegs[i].a});
    if(sameP(gSegs[i].b,gSegs[j].a)||sameP(gSegs[i].b,gSegs[j].b))pts.push({...gSegs[i].b});
    const cp=segCrossPoint(gSegs[i],gSegs[j]);
    if(cp)pts.push(cp);
  }
  return pts;
}
function hasSeg(a,b){return gSegs.some(s=>(sameP(s.a,a)&&sameP(s.b,b))||(sameP(s.a,b)&&sameP(s.b,a)))}
function toSvgPoint(svg,clientX,clientY){
  const p=svg.createSVGPoint();
  p.x=clientX;
  p.y=clientY;
  const m=svg.getScreenCTM();
  if(!m)return{x:0,y:0};
  const pt=p.matrixTransform(m.inverse());
  return{x:pt.x,y:pt.y};
}

// Build ext arrow data for all segments (used by drawGrid to render inline)
function getExtArrows(){
  const arrows=[];
  gSegs.forEach((seg,si)=>{
    const dx=seg.b.x-seg.a.x,dy=seg.b.y-seg.a.y;
    const len=Math.hypot(dx,dy)||1;
    const ux=dx/len,uy=dy/len;
    if(!seg.extA){
      arrows.push({x:seg.a.x-ux*EXT_ARROW_OFFSET,y:seg.a.y-uy*EXT_ARROW_OFFSET,
        epx:seg.a.x,epy:seg.a.y,ux:-ux,uy:-uy,segIdx:si,end:'A'});
    }
    if(!seg.extB){
      arrows.push({x:seg.b.x+ux*EXT_ARROW_OFFSET,y:seg.b.y+uy*EXT_ARROW_OFFSET,
        epx:seg.b.x,epy:seg.b.y,ux:ux,uy:uy,segIdx:si,end:'B'});
    }
  });
  return arrows;
}

// Find the best arrow to show for a hovered point
function pickArrowForHover(arrows,pt,rawX,rawY){
  const near=arrows.filter(a=>Math.hypot(a.epx-pt.x,a.epy-pt.y)<2);
  if(near.length===0)return null;
  let best=near[0],bestD=Infinity;
  near.forEach(a=>{const d=Math.hypot(a.x-rawX,a.y-rawY);if(d<bestD){bestD=d;best=a}});
  return best;
}

// Hit-test click against ext arrows (in SVG coords)
function hitExtArrow(arrows,rawX,rawY){
  const HIT=14;
  return arrows.find(a=>Math.hypot(a.x-rawX,a.y-rawY)<HIT)||null;
}

    if(seg.extA||seg.extB){
      if(seg.extA){const nx=-uy,ny=ux;s+=`<line x1="${seg.a.x}" y1="${seg.a.y}" x2="${seg.a.x-ux*600}" y2="${seg.a.y-uy*600}" stroke="#C7C7CC" stroke-width="1.5"/>`;const ax=seg.a.x-ux*25,ay=seg.a.y-uy*25,as=7;s+=`<polygon points="${ax},${ay} ${ax+ux*as+nx*as*.5},${ay+uy*as+ny*as*.5} ${ax+ux*as-nx*as*.5},${ay+uy*as-ny*as*.5}" fill="#C7C7CC"/>`}
      if(seg.extB){const nx=-uy,ny=ux;s+=`<line x1="${seg.b.x}" y1="${seg.b.y}" x2="${seg.b.x+ux*600}" y2="${seg.b.y+uy*600}" stroke="#C7C7CC" stroke-width="1.5"/>`;const ax=seg.b.x+ux*25,ay=seg.b.y+uy*25,as=7;s+=`<polygon points="${ax},${ay} ${ax-ux*as+nx*as*.5},${ay-uy*as+ny*as*.5} ${ax-ux*as-nx*as*.5},${ay-uy*as-ny*as*.5}" fill="#C7C7CC"/>`}
    }
    s+=`<line x1="${seg.a.x}" y1="${seg.a.y}" x2="${seg.b.x}" y2="${seg.b.y}" stroke="#1D1D1F" stroke-width="2.5" stroke-linecap="round"/>`;
  });
  gPts.forEach((p,i)=>{
    const sel=i===gSel;
    s+=`<circle cx="${p.x}" cy="${p.y}" r="${sel?8:5}" fill="${sel?'#007AFF':'#FF3B30'}"/>`;
    if(sel)s+=`<circle cx="${p.x}" cy="${p.y}" r="14" fill="none" stroke="#007AFF" stroke-width="1.5" stroke-opacity=".2"/>`;
  });
  // Show intersection points (crossing points)
  if(gSegs.length>=2){
    const ixPts=findAllIntersections();
    ixPts.forEach(ip=>{
      // Don't double-draw on top of existing placed points
      const isPlaced=gPts.some(p=>Math.hypot(p.x-ip.x,p.y-ip.y)<3);
      if(!isPlaced){
        s+=`<circle cx="${ip.x}" cy="${ip.y}" r="5" fill="#34C759" stroke="white" stroke-width="1.5"/>`;
      }
    });
  }
  // Render ext arrows only for the SELECTED point (gSel), not hover
  if(gSegs.length>0&&gSel>=0){
    const pt=gPts[gSel];
    if(pt){
      const arrows=getExtArrows();
      // Show ALL arrows for this selected point
      const matching=arrows.filter(a=>Math.hypot(a.epx-pt.x,a.epy-pt.y)<2);
      matching.forEach(best=>{
        const angle=Math.atan2(best.uy,best.ux)*180/Math.PI;
        const sz=8;
        s+=`<g style="cursor:pointer">`;
        s+=`<circle cx="${best.x}" cy="${best.y}" r="12" fill="rgba(0,122,255,.08)"><animate attributeName="r" values="10;14;10" dur="1.4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".4;.8;.4" dur="1.4s" repeatCount="indefinite"/></circle>`;
        s+=`<g transform="translate(${best.x},${best.y}) rotate(${angle})"><polygon points="${sz},0 ${-sz*.5},${-sz*.6} ${-sz*.5},${sz*.6}" fill="#007AFF"><animate attributeName="opacity" values=".5;1;.5" dur="1.4s" repeatCount="indefinite"/></polygon></g>`;
        s+=`</g>`;
      });
    }
  }
  svg.innerHTML=s;
}

function setupGrid(){
  const svg=document.getElementById('svg');if(!svg)return;
  svg.onclick=e=>{
    if(modalOpen)return;
    const pt=toSvgPoint(svg,e.clientX,e.clientY);
    const rawX=pt.x,rawY=pt.y;

    // 1. Check if tapping an ext arrow (only visible when gSel is an endpoint)
    if(gSel>=0&&gSegs.length>0){
      const selPt=gPts[gSel];
      if(selPt){
        const arrows=getExtArrows();
        const matching=arrows.filter(a=>Math.hypot(a.epx-selPt.x,a.epy-selPt.y)<2);
        for(const arr of matching){
          if(Math.hypot(arr.x-rawX,arr.y-rawY)<S*.6){
            const seg=gSegs[arr.segIdx];if(!seg)continue;
            if(arr.end==='A')seg.extA=true; else seg.extB=true;
            gSel=-1;drawGrid();detect();return;
          }
        }
      }
    }

    // 2. Check if tapping an existing point
    const hit=gPts.findIndex(p=>Math.hypot(p.x-rawX,p.y-rawY)<GRID_HIT_RADIUS);
    if(hit>=0){
      if(gSel===-1){
        // Nothing selected → select this point
        gSel=hit;drawGrid();detect();return;
      }
      if(gSel===hit){
        // Tapped the already-selected point → deselect
        gSel=-1;drawGrid();return;
      }
      // Different point selected → connect them with a segment
      if(!hasSeg(gPts[gSel],gPts[hit])){
        gSegs.push({a:{...gPts[gSel]},b:{...gPts[hit]},extA:false,extB:false});
      }
      gSel=-1;drawGrid();detect();return;
    }

    // 3. Tapping empty grid — check if snapped position has a point
    const gx=Math.round((rawX-P)/S)*S+P,gy=Math.round((rawY-P)/S)*S+P;
    if(gx<P||gx>420||gy<P||gy>280)return;
    const existIdx=gPts.findIndex(p=>p.x===gx&&p.y===gy);
    if(existIdx>=0){
      // Snapped to existing point — treat as point tap
      if(gSel===-1){gSel=existIdx;drawGrid();detect();return}
      if(gSel===existIdx){gSel=-1;drawGrid();return}
      if(!hasSeg(gPts[gSel],gPts[existIdx]))gSegs.push({a:{...gPts[gSel]},b:{...gPts[existIdx]},extA:false,extB:false});
      gSel=-1;drawGrid();detect();return;
    }

    // 4. Truly empty grid spot — just create a new point (NOT selected, NOT connected)
    //    If something was selected, deselect it first
    gPts.push({x:gx,y:gy});
    gSel=-1;
    drawGrid();detect();
  };

  // Mouse hover — no arrow logic needed anymore, arrows are selection-based
  svg.onmousemove=null;
  svg.onmouseleave=null;
}

// ==================== PROTRACTOR CANVAS (T2) ====================
// State: protVertex = vertex has been tapped at least once
// protRays = array of degrees [0-2 items]
// protSelRay = index of selected ray for moving (-1 = none)
// protWaitingForArc = true when vertex was just tapped and we're waiting for arc tap
let protRays=[],protVertex=false,protSelRay=-1,protWaitingForArc=false;

function protAngle(){
  if(protRays.length<2)return 0;
  return Math.abs(protRays[1]-protRays[0]);
}

function drawProt(){
  const svg=document.getElementById('svg');if(!svg)return;
  const W=440,H=320,cx=W/2,cy=H-50,R=Math.min(cx-20,cy-20);
  let s='';
  // Tick marks every 5°
  for(let d=0;d<=180;d+=5){
    const rad=d*Math.PI/180;
    const is90=d===0||d===90||d===180,is45=d%45===0;
    const tLen=is90?18:is45?14:10;
    const x1=cx+Math.cos(Math.PI-rad)*R,y1=cy-Math.sin(Math.PI-rad)*R;
    const x2=cx+Math.cos(Math.PI-rad)*(R-tLen),y2=cy-Math.sin(Math.PI-rad)*(R-tLen);
    const sw=is90?1:is45?.7:.4;
    const col=is90?'#1D1D1F':is45?'#6E6E73':'#AEAEB2';
    s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${sw}"/>`;
    if(is90||is45){
      const lx=cx+Math.cos(Math.PI-rad)*(R-24),ly=cy-Math.sin(Math.PI-rad)*(R-24);
      s+=`<text x="${lx}" y="${ly}" font-size="${is90?11:9}" fill="${is90?'#1D1D1F':'#8E8E93'}" font-weight="${is90?700:500}" text-anchor="middle" dominant-baseline="middle">${d}°</text>`;
    }
  }
  // Arc and baseline
  s+=`<path d="M ${cx+R} ${cy} A ${R} ${R} 0 0 0 ${cx-R} ${cy}" fill="none" stroke="#E5E5EA" stroke-width="1"/>`;
  s+=`<line x1="${cx-R-10}" y1="${cy}" x2="${cx+R+10}" y2="${cy}" stroke="#E5E5EA" stroke-width=".5"/>`;
  
  // Vertex point — shows state
  const vGlow=protWaitingForArc;
  s+=`<circle cx="${cx}" cy="${cy}" r="${protVertex?7:10}" fill="${protVertex?'#FF3B30':'rgba(255,59,48,.25)'}" ${protVertex?'':'stroke="#FF3B30" stroke-width="2" stroke-dasharray="4,3"'}/>`;
  if(vGlow){
    s+=`<circle cx="${cx}" cy="${cy}" r="14" fill="none" stroke="#FF3B30" stroke-width="2" stroke-opacity=".4"><animate attributeName="r" values="12;18;12" dur="1.2s" repeatCount="indefinite"/><animate attributeName="stroke-opacity" values=".4;.1;.4" dur="1.2s" repeatCount="indefinite"/></circle>`;
  }
  // Prompt text
  if(!protVertex){
    s+=`<text x="${cx}" y="${cy+22}" font-size="9" fill="#FF3B30" font-weight="600" text-anchor="middle">tap vertex</text>`;
  }else if(protWaitingForArc){
    s+=`<text x="${cx}" y="${cy+22}" font-size="9" fill="#007AFF" font-weight="600" text-anchor="middle">now tap the arc</text>`;
  }else if(protRays.length<2){
    s+=`<text x="${cx}" y="${cy+22}" font-size="9" fill="#FF3B30" font-weight="600" text-anchor="middle">tap vertex for next ray</text>`;
  }

  // Angle fill (if two rays)
  if(protRays.length===2){
    const a1=Math.min(...protRays),a2=Math.max(...protRays);
    const deg=a2-a1;
    const col=deg<88?'rgba(0,122,255,.06)':deg<=92?'rgba(175,82,222,.06)':'rgba(52,199,89,.06)';
    const sc=deg<88?'#007AFF':deg<=92?'#AF52DE':'#34C759';
    const arcR=R*.3;
    const ax1=cx+Math.cos(Math.PI-a1*Math.PI/180)*arcR,ay1=cy-Math.sin(Math.PI-a1*Math.PI/180)*arcR;
    const ax2=cx+Math.cos(Math.PI-a2*Math.PI/180)*arcR,ay2=cy-Math.sin(Math.PI-a2*Math.PI/180)*arcR;
    const large=deg>180?1:0;
    s+=`<path d="M ${cx} ${cy} L ${ax1} ${ay1} A ${arcR} ${arcR} 0 ${large} 0 ${ax2} ${ay2} Z" fill="${col}" stroke="${sc}" stroke-width="1"/>`;
    if(deg>=88&&deg<=92){
      const sz=14,r1=a1*Math.PI/180,r2=a2*Math.PI/180;
      const mx1=cx+Math.cos(Math.PI-r1)*sz,my1=cy-Math.sin(Math.PI-r1)*sz;
      const mx2=cx+Math.cos(Math.PI-r2)*sz,my2=cy-Math.sin(Math.PI-r2)*sz;
      s+=`<path d="M ${mx1} ${my1} L ${mx1+Math.cos(Math.PI-r2)*sz} ${my1-Math.sin(Math.PI-r2)*sz} L ${mx2} ${my2}" fill="none" stroke="#AF52DE" stroke-width="2"/>`;
    }
  }

  // Rays (drawn as rays with arrowheads)
  protRays.forEach((deg,i)=>{
    const rad=deg*Math.PI/180;
    const dirX=Math.cos(Math.PI-rad),dirY=-Math.sin(Math.PI-rad);
    const rx=cx+dirX*R*.92,ry=cy+dirY*R*.92;
    s+=`<line x1="${cx}" y1="${cy}" x2="${rx}" y2="${ry}" stroke="#1D1D1F" stroke-width="2.5" stroke-linecap="round"/>`;
    // Arrowhead
    const aLen=8,aW=4;
    const nx=-dirY,ny=dirX;
    s+=`<polygon points="${rx},${ry} ${rx-dirX*aLen+nx*aW},${ry-dirY*aLen+ny*aW} ${rx-dirX*aLen-nx*aW},${ry-dirY*aLen-ny*aW}" fill="#1D1D1F"/>`;
    // Handle on the arc
    const hx=cx+dirX*R,hy=cy+dirY*R;
    const isSel=protSelRay===i;
    s+=`<circle cx="${hx}" cy="${hy}" r="${isSel?12:10}" fill="${isSel?'#FF9500':'#007AFF'}" opacity=".85" style="cursor:pointer"/>`;
    s+=`<circle cx="${hx}" cy="${hy}" r="3.5" fill="white"/>`;
    if(isSel)s+=`<circle cx="${hx}" cy="${hy}" r="16" fill="none" stroke="#FF9500" stroke-width="1.5" stroke-opacity=".3"/>`;
  });

  svg.innerHTML=s;
  updateProtUI();
}

function updateProtUI(){
  const rd=document.getElementById('angRead'),tp=document.getElementById('angType');
  if(!rd||!tp)return;
  if(protRays.length<2){
    rd.textContent='—';
    tp.textContent=protWaitingForArc?'Tap the arc':protRays.length===1?'Tap vertex':'Place rays';
    tp.className='angle-type none';return;
  }
  const deg=protAngle();
  rd.textContent=deg+'°';
  if(deg<88){tp.textContent='Acute';tp.className='angle-type acute'}
  else if(deg<=92){tp.textContent='Right Angle';tp.className='angle-type right'}
  else{tp.textContent='Obtuse';tp.className='angle-type obtuse'}
}

function setupProt(){
  const svg=document.getElementById('svg');if(!svg)return;
  const W=440,H=320,cx=W/2,cy=H-50,R=Math.min(cx-20,cy-20);
  
  function clickDegFromPoint(mx,my){
    const dx=mx-cx,dy=cy-my;
    let deg=Math.atan2(dy,-dx)*180/Math.PI;
    if(deg<0)deg+=360;
    // Snap to nearest 5
    deg=Math.round(deg/5)*5;
    // Allow 0 and 180 (no clamping away from edges)
    return Math.max(0,Math.min(180,deg));
  }
  
  function hitRayHandle(mx,my){
    for(let i=0;i<protRays.length;i++){
      const rad=protRays[i]*Math.PI/180;
      const hx=cx+Math.cos(Math.PI-rad)*R,hy=cy-Math.sin(Math.PI-rad)*R;
      if(Math.hypot(mx-hx,my-hy)<22)return i; // generous touch target
    }
    return -1;
  }
  
  function isOnArc(mx,my){
    const dist=Math.hypot(mx-cx,my-cy);
    // Very generous: anywhere above-ish center and beyond 35% radius
    // Also accept taps near the baseline for 0° and 180°
    return dist>R*0.3&&(cy-my)>-30;
  }
  
  svg.onclick=e=>{
    if(modalOpen)return;
    const pt=toSvgPoint(svg,e.clientX,e.clientY);
    const mx=pt.x,my=pt.y;
    
    // Check if clicking an existing ray handle (for moving)
    if(protRays.length>0&&!protWaitingForArc){
      const hitRay=hitRayHandle(mx,my);
      if(hitRay>=0){
        protSelRay=protSelRay===hitRay?-1:hitRay;
        drawProt();
        return;
      }
    }
    
    // If a ray is selected and clicking the arc, move it
    if(protSelRay>=0&&isOnArc(mx,my)){
      protRays[protSelRay]=clickDegFromPoint(mx,my);
      protSelRay=-1;
      drawProt();
      if(protRays.length===2)setTimeout(()=>detect(),300);
      return;
    }
    
    // Clicking vertex
    if(Math.hypot(mx-cx,my-cy)<25){
      if(!protVertex){
        protVertex=true;
        protWaitingForArc=true;
        drawProt();detect();
        return;
      }
      // Already activated — start building a ray
      if(protRays.length<2){
        protWaitingForArc=true;
        protSelRay=-1;
        drawProt();
        return;
      }
      return;
    }
    
    // Clicking arc while waiting for arc tap (building a ray)
    if(protWaitingForArc&&isOnArc(mx,my)){
      const deg=clickDegFromPoint(mx,my);
      protRays.push(deg);
      protWaitingForArc=false;
      drawProt();
      if(protRays.length===2)setTimeout(()=>detect(),300);
      else detect();
      return;
    }
  };
}

// ==================== TRIANGLE CANVAS (T3) ====================
let triAngA=null,triAngB=null,triSelVert=null;
const TRI_W=440,TRI_H=400,TRI_BASE_Y=340,TRI_BASE_AX=110,TRI_BASE_BX=330,TRI_R=120;

// Ray from vertex A: angle measured from baseline (A→B direction), going up
// Ray from vertex B: angle measured from baseline (B→A direction), going up
function triRayDir(vert,deg){
  const rad=deg*Math.PI/180;
  if(vert==='A'){
    // 0° points right (toward B), 90° points up, 180° points left
    return{dx:Math.cos(rad),dy:-Math.sin(rad)};
  }else{
    // 0° points left (toward A), 90° points up, 180° points right
    return{dx:-Math.cos(rad),dy:-Math.sin(rad)};
  }
}

function triApex(){
  if(triAngA===null||triAngB===null)return null;
  const ax=TRI_BASE_AX,bx=TRI_BASE_BX,by=TRI_BASE_Y;
  const dA=triRayDir('A',triAngA),dB=triRayDir('B',triAngB);
  const det=dA.dx*dB.dy-dA.dy*dB.dx;
  if(Math.abs(det)<0.001)return null;
  const t=((bx-ax)*dB.dy-(by-by)*dB.dx)/det;
  if(t<0.01)return null;
  return{x:ax+t*dA.dx,y:by+t*dA.dy};
}

function triAngles3(){
  if(triAngA===null||triAngB===null)return null;
  const a3=180-triAngA-triAngB;
  if(a3<=0)return null;
  return[triAngA,triAngB,Math.round(a3*10)/10];
}

function triSideLens(){
  const apex=triApex();
  if(!apex)return null;
  const ax=TRI_BASE_AX,bx=TRI_BASE_BX,by=TRI_BASE_Y;
  return[
    Math.hypot(bx-ax,by-by),
    Math.hypot(apex.x-ax,apex.y-by),
    Math.hypot(apex.x-bx,apex.y-by)
  ];
}

function classifyTri(){
  const angs=triAngles3();
  if(!angs)return{sides:'',angles:''};
  const sides=triSideLens();
  if(!sides)return{sides:'',angles:''};
  const tol=2;
  const eq=(a,b)=>Math.abs(a-b)<tol;
  let sideType='scalene';
  if(eq(sides[0],sides[1])&&eq(sides[1],sides[2]))sideType='equilateral';
  else if(eq(sides[0],sides[1])||eq(sides[1],sides[2])||eq(sides[0],sides[2]))sideType='isosceles';
  let angType='acute_tri';
  const mx=Math.max(...angs);
  if(mx>=88&&mx<=92)angType='right_tri';
  else if(mx>92)angType='obtuse_tri';
  return{sides:sideType,angles:angType,angs};
}

function drawTriProtractor(s,vcx,vert,R,by){
  // A: 0° is RIGHT, arc sweeps counterclockwise to 180° LEFT
  // B: 0° is LEFT, arc sweeps counterclockwise to 180° RIGHT
  for(let d=0;d<=180;d+=5){
    const dir=triRayDir(vert,d);
    const x1=vcx+dir.dx*R,y1=by+dir.dy*R;
    const x2=vcx+dir.dx*(R-((d%90===0)?14:(d%45===0)?10:(d%30===0)?8:5));
    const y2=by+dir.dy*(R-((d%90===0)?14:(d%45===0)?10:(d%30===0)?8:5));
    const is90=d%90===0,is45=d%45===0;
    s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${is90?'#1D1D1F':is45?'#AEAEB2':'#D1D1D6'}" stroke-width="${is90?.8:is45?.5:.3}"/>`;
    if(is90||is45){
      const ldir=triRayDir(vert,d);
      const lx=vcx+ldir.dx*(R-20),ly=by+ldir.dy*(R-20);
      s+=`<text x="${lx}" y="${ly}" font-size="${is90?9:7}" fill="${is90?'#1D1D1F':'#8E8E93'}" font-weight="${is90?700:500}" text-anchor="middle" dominant-baseline="middle">${d}°</text>`;
    }
  }
  // Arc
  const p0=triRayDir(vert,0),p180=triRayDir(vert,180);
  const sx=vcx+p0.dx*R,sy=by+p0.dy*R;
  const ex=vcx+p180.dx*R,ey=by+p180.dy*R;
  s+=`<path d="M ${sx} ${sy} A ${R} ${R} 0 0 ${vert==='A'?0:1} ${ex} ${ey}" fill="none" stroke="rgba(0,122,255,.15)" stroke-width="1"/>`;
  s+=`<text x="${vcx}" y="${by+18}" font-size="8" fill="#007AFF" font-weight="600" text-anchor="middle">tap arc to set angle</text>`;
  return s;
}

function drawTri(){
  const svg=document.getElementById('svg');if(!svg)return;
  const W=TRI_W,H=TRI_H,ax=TRI_BASE_AX,bx=TRI_BASE_BX,by=TRI_BASE_Y,R=TRI_R;
  let s='';
  
  const apex=triApex();
  let vx=0,vy=0,vw=W,vh=H;
  if(apex&&apex.y<20){
    const pad=30;
    const minY=Math.min(apex.y,0)-pad;
    vy=minY;vh=TRI_BASE_Y-minY+50;
    vw=W*(vh/H);
    vx=(W-vw)/2;
  }
  svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);
  
  // Baseline
  s+=`<line x1="${ax-30}" y1="${by}" x2="${bx+30}" y2="${by}" stroke="#E5E5EA" stroke-width="1"/>`;

  // Active protractor — ONLY when a vertex is selected
  if(triSelVert){
    const vcx=triSelVert==='A'?ax:bx;
    s=drawTriProtractor(s,vcx,triSelVert,R,by);
  }

  // Draw existing rays
  if(triAngA!==null){
    const d=triRayDir('A',triAngA);
    const rayLen=apex?Math.hypot(apex.x-ax,apex.y-by)+20:R*1.5;
    const rx=ax+d.dx*rayLen,ry=by+d.dy*rayLen;
    s+=`<line x1="${ax}" y1="${by}" x2="${rx}" y2="${ry}" stroke="#1D1D1F" stroke-width="2" stroke-linecap="round"/>`;
    const ul=Math.hypot(d.dx,d.dy),ux=d.dx/ul,uy=d.dy/ul;
    const al=7,aw=3.5,nx=-uy,ny=ux;
    s+=`<polygon points="${rx},${ry} ${rx-ux*al+nx*aw},${ry-uy*al+ny*aw} ${rx-ux*al-nx*aw},${ry-uy*al-ny*aw}" fill="#1D1D1F"/>`;
  }
  if(triAngB!==null){
    const d=triRayDir('B',triAngB);
    const rayLen=apex?Math.hypot(apex.x-bx,apex.y-by)+20:R*1.5;
    const rx=bx+d.dx*rayLen,ry=by+d.dy*rayLen;
    s+=`<line x1="${bx}" y1="${by}" x2="${rx}" y2="${ry}" stroke="#1D1D1F" stroke-width="2" stroke-linecap="round"/>`;
    const ul=Math.hypot(d.dx,d.dy),ux=d.dx/ul,uy=d.dy/ul;
    const al=7,aw=3.5,nx=-uy,ny=ux;
    s+=`<polygon points="${rx},${ry} ${rx-ux*al+nx*aw},${ry-uy*al+ny*aw} ${rx-ux*al-nx*aw},${ry-uy*al-ny*aw}" fill="#1D1D1F"/>`;
  }

  // Triangle fill and apex
  if(apex){
    s+=`<polygon points="${ax},${by} ${bx},${by} ${apex.x},${apex.y}" fill="rgba(0,122,255,.04)" stroke="#007AFF" stroke-width="1.5" stroke-linejoin="round"/>`;
    s+=`<circle cx="${apex.x}" cy="${apex.y}" r="5" fill="#007AFF"/>`;
    const angs=triAngles3();
    if(angs){
      // Draw angle arcs with degree labels at each vertex
      const arcR=28;
      // Angle at A (between base AB and ray AC)
      const aRadStart=0; // base direction is toward B (right)
      const aRadEnd=triAngA*Math.PI/180; // ray direction
      const aArc1x=ax+Math.cos(aRadStart)*arcR, aArc1y=by-Math.sin(aRadStart)*arcR;
      const aArc2x=ax+Math.cos(aRadEnd)*arcR, aArc2y=by-Math.sin(aRadEnd)*arcR;
      const aLarge=triAngA>180?1:0;
      s+=`<path d="M ${aArc1x} ${aArc1y} A ${arcR} ${arcR} 0 ${aLarge} 0 ${aArc2x} ${aArc2y}" fill="none" stroke="#007AFF" stroke-width="1.5"/>`;
      const aMid=aRadEnd/2;
      const aLx=ax+Math.cos(aMid)*(arcR+12), aLy=by-Math.sin(aMid)*(arcR+12);
      s+=`<text x="${aLx}" y="${aLy}" font-size="10" fill="#007AFF" font-weight="700" text-anchor="middle" dominant-baseline="middle">${Math.round(angs[0])}°</text>`;
      
      // Angle at B (between base BA and ray BC)
      const bRadStart=Math.PI; // base direction is toward A (left)
      const bRadEnd=Math.PI-triAngB*Math.PI/180; // ray direction
      const bArc1x=bx+Math.cos(bRadStart)*arcR, bArc1y=by-Math.sin(bRadStart)*arcR;
      const bArc2x=bx+Math.cos(bRadEnd)*arcR, bArc2y=by-Math.sin(bRadEnd)*arcR;
      const bLarge=triAngB>180?1:0;
      s+=`<path d="M ${bArc1x} ${bArc1y} A ${arcR} ${arcR} 0 ${bLarge} 1 ${bArc2x} ${bArc2y}" fill="none" stroke="#007AFF" stroke-width="1.5"/>`;
      const bMid=(bRadStart+bRadEnd)/2;
      const bLx=bx+Math.cos(bMid)*(arcR+12), bLy=by-Math.sin(bMid)*(arcR+12);
      s+=`<text x="${bLx}" y="${bLy}" font-size="10" fill="#007AFF" font-weight="700" text-anchor="middle" dominant-baseline="middle">${Math.round(angs[1])}°</text>`;
      
      // Angle at C (apex) — compute directions from C to A and C to B
      const cAng=Math.round(angs[2]);
      const cToAx=ax-apex.x, cToAy=by-apex.y;
      const cToBx=bx-apex.x, cToBy=by-apex.y;
      const cAngA=Math.atan2(-cToAy,cToAx), cAngB=Math.atan2(-cToBy,cToBx);
      // Determine sweep — go from A-direction to B-direction the short way (clockwise in SVG)
      let cStart=cAngA, cEnd=cAngB;
      // We want the arc that goes through the interior of the triangle (downward)
      // Use the cross product to figure out direction
      const cross=cToAx*cToBy-cToAy*cToBx;
      const cArc1x=apex.x+Math.cos(cStart)*arcR, cArc1y=apex.y-Math.sin(cStart)*arcR;
      const cArc2x=apex.x+Math.cos(cEnd)*arcR, cArc2y=apex.y-Math.sin(cEnd)*arcR;
      const cLarge=cAng>180?1:0;
      const cSweep=cross>0?0:1;
      s+=`<path d="M ${cArc1x} ${cArc1y} A ${arcR} ${arcR} 0 ${cLarge} ${cSweep} ${cArc2x} ${cArc2y}" fill="none" stroke="#007AFF" stroke-width="1.5"/>`;
      const cMidAng=(cStart+cEnd)/2;
      // Check if midpoint is on the interior side; if not, flip by PI
      const cMidTestX=apex.x+Math.cos(cMidAng)*10, cMidTestY=apex.y-Math.sin(cMidAng)*10;
      const midToBaseY=by-cMidTestY;
      let cLabelAng=cMidAng;
      if(midToBaseY<0) cLabelAng=cMidAng+Math.PI;
      const cLx=apex.x+Math.cos(cLabelAng)*(arcR+12), cLy=apex.y-Math.sin(cLabelAng)*(arcR+12);
      s+=`<text x="${cLx}" y="${cLy}" font-size="10" fill="#007AFF" font-weight="700" text-anchor="middle" dominant-baseline="middle">${cAng}°</text>`;
      
      // Right angle square marker if any angle is ~90°
      if(Math.abs(angs[0]-90)<=2){
        const sqSz=12;
        s+=`<path d="M ${ax+sqSz} ${by} L ${ax+sqSz} ${by-sqSz} L ${ax} ${by-sqSz}" fill="none" stroke="#AF52DE" stroke-width="1.5"/>`;
      }
      if(Math.abs(angs[1]-90)<=2){
        const sqSz=12;
        s+=`<path d="M ${bx-sqSz} ${by} L ${bx-sqSz} ${by-sqSz} L ${bx} ${by-sqSz}" fill="none" stroke="#AF52DE" stroke-width="1.5"/>`;
      }
    }
  }
  
  // Base segment
  s+=`<line x1="${ax}" y1="${by}" x2="${bx}" y2="${by}" stroke="#1D1D1F" stroke-width="2.5" stroke-linecap="round"/>`;
  
  // Vertex points — same color, selected one gets highlight
  const selA=triSelVert==='A';
  const selB=triSelVert==='B';
  s+=`<circle cx="${ax}" cy="${by}" r="${selA?8:6}" fill="${selA?'#FF9500':'#007AFF'}" style="cursor:pointer"/>`;
  s+=`<circle cx="${bx}" cy="${by}" r="${selB?8:6}" fill="${selB?'#FF9500':'#007AFF'}" style="cursor:pointer"/>`;
  if(selA)s+=`<circle cx="${ax}" cy="${by}" r="12" fill="none" stroke="#FF9500" stroke-width="1.5" stroke-opacity=".3"/>`;
  if(selB)s+=`<circle cx="${bx}" cy="${by}" r="12" fill="none" stroke="#FF9500" stroke-width="1.5" stroke-opacity=".3"/>`;
  s+=`<text x="${ax}" y="${by+18}" font-size="9" fill="#007AFF" font-weight="600" text-anchor="middle">A</text>`;
  s+=`<text x="${bx}" y="${by+18}" font-size="9" fill="#007AFF" font-weight="600" text-anchor="middle">B</text>`;
  if(apex)s+=`<text x="${apex.x}" y="${apex.y-10}" font-size="9" fill="#007AFF" font-weight="600" text-anchor="middle">C</text>`;
  
  // Prompt when nothing selected
  if(!triSelVert&&triAngA===null)s+=`<text x="${(ax+bx)/2}" y="${by-20}" font-size="9" fill="#007AFF" font-weight="600" text-anchor="middle">tap a vertex to start</text>`;

  svg.innerHTML=s;
  updateTriUI();
}

function updateTriUI(){
  const rd=document.getElementById('triRead'),tp=document.getElementById('triType');
  if(!rd||!tp)return;
  if(triAngA===null||triAngB===null){
    rd.textContent='—';
    if(triSelVert)tp.textContent=`Tap arc for angle at ${triSelVert}`;
    else if(triAngA!==null)tp.textContent='Tap vertex B';
    else tp.textContent='Tap a vertex';
    tp.className='angle-type none';return;
  }
  const a3=180-triAngA-triAngB;
  if(a3<=0){
    rd.textContent='No triangle';
    tp.textContent='Angles must sum to less than 180°';
    tp.className='angle-type none';return;
  }
  const cls=classifyTri();
  const names={equilateral:'Equilateral',isosceles:'Isosceles',scalene:'Scalene'};
  const angNames={acute_tri:'Acute',right_tri:'Right',obtuse_tri:'Obtuse'};
  rd.textContent=`${names[cls.sides]||''} ${angNames[cls.angles]||''}`;
  const col=cls.angles==='right_tri'?'right':cls.angles==='obtuse_tri'?'obtuse':'acute';
  tp.textContent=`${Math.round(triAngA)}° + ${Math.round(triAngB)}° + ${Math.round(a3)}° = 180°`;
  tp.className='angle-type '+col;
}

function setupTri(){
  const svg=document.getElementById('svg');if(!svg)return;
  const ax=TRI_BASE_AX,bx=TRI_BASE_BX,by=TRI_BASE_Y,R=TRI_R;
  
  function clickDegForVert(vert,mx,my){
    const vcx=vert==='A'?ax:bx;
    // Get the direction from vertex to click point
    const cdx=mx-vcx,cdy=my-by;
    // For A: 0° is right (+x), for B: 0° is left (-x). Both: 90° is up (-y).
    let deg;
    if(vert==='A'){
      deg=Math.atan2(-cdy,cdx)*180/Math.PI;
    }else{
      deg=Math.atan2(-cdy,-cdx)*180/Math.PI;
    }
    if(deg<0)deg+=360;
    deg=Math.round(deg/5)*5;
    return Math.max(5,Math.min(175,deg));
  }
  
  svg.onclick=e=>{
    if(modalOpen)return;
    const pt=toSvgPoint(svg,e.clientX,e.clientY);
    const mx=pt.x,my=pt.y;
    
    // Tap vertex A?
    if(Math.hypot(mx-ax,my-by)<22){
      triSelVert=triSelVert==='A'?null:'A';
      drawTri();return;
    }
    // Tap vertex B?
    if(Math.hypot(mx-bx,my-by)<22){
      triSelVert=triSelVert==='B'?null:'B';
      drawTri();return;
    }
    
    // Tap on active protractor arc?
    if(triSelVert){
      const vcx=triSelVert==='A'?ax:bx;
      const dist=Math.hypot(mx-vcx,my-by);
      if(dist>R*0.3&&(by-my)>-25){
        const deg=clickDegForVert(triSelVert,mx,my);
        if(triSelVert==='A')triAngA=deg; else triAngB=deg;
        triSelVert=null;
        drawTri();
        if(triAngA!==null&&triAngB!==null)setTimeout(()=>detect(),300);
        return;
      }
    }
  };
}

// ==================== QUADRILATERAL CANVAS (T4) ====================
let qPts=[],qSegs=[],qSel=-1,qComplete=false;

function qSameP(a,b){return Math.abs(a.x-b.x)<1&&Math.abs(a.y-b.y)<1}
function qHasSeg(a,b){return qSegs.some(s=>(qSameP(s.a,a)&&qSameP(s.b,b))||(qSameP(s.a,b)&&qSameP(s.b,a)))}

function qSideLens(){
  if(qSegs.length<4)return null;
  return qSegs.map(s=>Math.hypot(s.b.x-s.a.x,s.b.y-s.a.y));
}

function qSegDir2(s){
  const dx=s.b.x-s.a.x,dy=s.b.y-s.a.y;
  const len=Math.hypot(dx,dy)||1;
  return{ux:dx/len,uy:dy/len};
}

function qAreParallel(s1,s2){
  const d1=qSegDir2(s1),d2=qSegDir2(s2);
  const cross=Math.abs(d1.ux*d2.uy-d1.uy*d2.ux);
  return cross<0.01;
}

function qArePerpendicular(s1,s2){
  const d1=qSegDir2(s1),d2=qSegDir2(s2);
  const dot=Math.abs(d1.ux*d2.ux+d1.uy*d2.uy);
  return dot<0.05;
}

function qOrderedVertices(){
  // Return vertices in order around the quad from segs
  if(qSegs.length<4)return null;
  // Build adjacency from segments
  const verts=[];
  const start=qSegs[0].a;
  let cur={...start};
  const used=new Set();
  for(let i=0;i<4;i++){
    verts.push(cur);
    let found=false;
    for(let j=0;j<qSegs.length;j++){
      if(used.has(j))continue;
      if(qSameP(qSegs[j].a,cur)){used.add(j);cur={...qSegs[j].b};found=true;break}
      if(qSameP(qSegs[j].b,cur)){used.add(j);cur={...qSegs[j].a};found=true;break}
    }
    if(!found)return null;
  }
  // Verify it closes
  if(!qSameP(cur,start))return null;
  return verts;
}

function qGetOppositePairs(){
  // Return pairs of opposite sides: [[seg0,seg2],[seg1,seg3]]
  const verts=qOrderedVertices();
  if(!verts)return null;
  // Sides: 0-1, 1-2, 2-3, 3-0
  const sides=[];
  for(let i=0;i<4;i++){
    sides.push({a:verts[i],b:verts[(i+1)%4]});
  }
  return{sides,pairs:[[sides[0],sides[2]],[sides[1],sides[3]]]};
}

function classifyQuad(){
  const info=qGetOppositePairs();
  if(!info)return{type:'unknown'};
  const{sides,pairs}=info;
  const lens=sides.map(s=>Math.hypot(s.b.x-s.a.x,s.b.y-s.a.y));
  const tol=3;
  const eq=(a,b)=>Math.abs(a-b)<tol;
  
  const pair0Par=qAreParallel(pairs[0][0],pairs[0][1]);
  const pair1Par=qAreParallel(pairs[1][0],pairs[1][1]);
  const parallelPairs=(pair0Par?1:0)+(pair1Par?1:0);
  
  // Check for right angles at each vertex
  const rightAngles=[];
  for(let i=0;i<4;i++){
    if(qArePerpendicular(sides[i],sides[(i+1)%4]))rightAngles.push(i);
  }
  const allRight=rightAngles.length>=4;
  const allSidesEq=eq(lens[0],lens[1])&&eq(lens[1],lens[2])&&eq(lens[2],lens[3]);
  
  // Kite: 2 pairs of adjacent sides equal (side0==side1 && side2==side3, OR side0==side3 && side1==side2)
  const isKite=(eq(lens[0],lens[1])&&eq(lens[2],lens[3])&&!eq(lens[0],lens[2]))||
               (eq(lens[0],lens[3])&&eq(lens[1],lens[2])&&!eq(lens[0],lens[1]));
  
  // Build flags for all types this shape qualifies as
  const is={quadrilateral:true,trapezoid:false,kite:false,parallelogram:false,rectangle:false,rhombus:false,square:false};
  
  if(parallelPairs===2){
    is.parallelogram=true;
    if(allRight)is.rectangle=true;
    if(allSidesEq)is.rhombus=true;
    if(allRight&&allSidesEq)is.square=true;
  }else if(parallelPairs===1){
    is.trapezoid=true;
  }
  if(isKite)is.kite=true;
  
  // Primary type (most specific)
  let type='quadrilateral';
  if(is.square)type='square';
  else if(is.rectangle)type='rectangle';
  else if(is.rhombus)type='rhombus';
  else if(is.parallelogram)type='parallelogram';
  else if(is.trapezoid)type='trapezoid';
  else if(is.kite)type='kite';
  
  return{type,is,parallelPairs,allRight,allSidesEq,lens,rightAngles};
}

// Rhombille grid constants for quadrilateral tier
// Creates interlocking diamond pattern for building both rectangles and rhombuses
const RH_S=40;
const RH_V=RH_S*Math.sqrt(3)/2; // vertical spacing for 60° rhombus
const RH_PX=22, RH_PY=20;

function rhombilleGridPoints(){
const pts=[];
const COLS=11;
const ROWS=9;
for(let r=0;r<ROWS;r++){
const y=RH_PY+r*RH_V; // proper 60° rhombus vertical spacing
const isIsoRow=(r%2===1);
for(let c=0;c<=COLS;c++){
const xOffset=isIsoRow?RH_S/2:0;
const x=RH_PX+c*RH_S+xOffset;
if(x<=420&&y<=290){
pts.push({x:Math.round(x*10)/10,y:Math.round(y*10)/10,r,c,rowType:isIsoRow?'iso':'sq'});
}
}
}
return pts;
}

// Alias functions for backwards compatibility
function hybridGridPoints(){return rhombilleGridPoints();}
function isoGridPoints(){return rhombilleGridPoints();}
function squareGridPoints(){return rhombilleGridPoints();}

const SQ_S=40, SQ_P=20; // snap radius reference

function snapToIso(rawX,rawY){
const gridPts=rhombilleGridPoints();
let best=null,bestD=Infinity;
gridPts.forEach(p=>{
const d=Math.hypot(p.x-rawX,p.y-rawY);
if(d<bestD){bestD=d;best=p}
});
if(bestD>RH_S*0.7)return null;
return best;
}

function drawQuadGrid(){
  const svg=document.getElementById('svg');if(!svg)return;
  let s='';
  
  // Draw rhombille grid - alternating rows for rectangle and rhombus construction
const pts=rhombilleGridPoints();
const byRow={};
pts.forEach(p=>{
if(!byRow[p.r])byRow[p.r]=[];
byRow[p.r].push(p);
});
// Sort rows by column
Object.values(byRow).forEach(row=>row.sort((a,b)=>a.c-b.c));
// Draw horizontal lines (all rows)
Object.values(byRow).forEach(row=>{
for(let i=0;i<row.length-1;i++){
s+=`<line x1="${row[i].x}" y1="${row[i].y}" x2="${row[i+1].x}" y2="${row[i+1].y}" stroke="#E8E8ED" stroke-width=".35"/>`;
}
});
// Build columns for vertical/diagonal connections
const byCol={};
pts.forEach(p=>{
if(!byCol[p.c])byCol[p.c]=[];
byCol[p.c].push(p);
});
Object.values(byCol).forEach(col=>col.sort((a,b)=>a.r-b.r));
// Draw vertical lines where columns align (for rectangle construction)
// A vertical line exists where points share the exact same x-coordinate
const allX={};
pts.forEach(p=>{
const key=`${p.x.toFixed(1)}`;
if(!allX[key])allX[key]=[];
allX[key].push(p);
});
Object.values(allX).forEach(ptsAtX=>{
if(ptsAtX.length>=2){
ptsAtX.sort((a,b)=>a.y-b.y);
for(let i=0;i<ptsAtX.length-1;i++){
s+=`<line x1="${ptsAtX[i].x}" y1="${ptsAtX[i].y}" x2="${ptsAtX[i+1].x}" y2="${ptsAtX[i+1].y}" stroke="#E8E8ED" stroke-width=".35"/>`;
}
}
});
// Draw diagonal connections (for rhombus construction - 60° angles)
// In a rhombille grid, diagonals connect offset rows to create equal-length sides
Object.values(byRow).forEach((row,rIdx)=>{
const nextRow=byRow[rIdx+1];
if(!nextRow)return;
row.forEach(p=>{
// Find the diagonal neighbor - same column on even rows, adjacent on odd
// This creates equilateral triangle edges (all sides = RH_S)
const neighbor=nextRow.find(n=>{
const dx=Math.abs(p.x-n.x);
const dy=Math.abs(p.y-n.y);
const dist=Math.hypot(dx,dy);
// Diagonal should be same length as side (approximately)
return Math.abs(dist-RH_S)<2;
});
if(neighbor){
s+=`<line x1="${p.x}" y1="${p.y}" x2="${neighbor.x}" y2="${neighbor.y}" stroke="#DDD" stroke-width=".25"/>`;
}
});
});
// Draw grid dots - different colors for even/odd rows
pts.forEach(p=>{
const color=(p.r%2===0)?'#D1D1D6':'#C8B8A8';
s+=`<circle cx="${p.x}" cy="${p.y}" r="1.5" fill="${color}"/>`;
});
  
  // Draw segments
  qSegs.forEach(seg=>{
    s+=`<line x1="${seg.a.x}" y1="${seg.a.y}" x2="${seg.b.x}" y2="${seg.b.y}" stroke="#1D1D1F" stroke-width="2.5" stroke-linecap="round"/>`;
  });
  
  // Fill if complete
  if(qComplete&&qSegs.length===4){
    const verts=qOrderedVertices();
    if(verts){
      const pts=verts.map(v=>`${v.x},${v.y}`).join(' ');
      s+=`<polygon points="${pts}" fill="rgba(0,122,255,.06)" stroke="#007AFF" stroke-width="1.5" stroke-linejoin="round"/>`;
      // Show classification
      const cls=classifyQuad();
      if(cls.rightAngles){
        cls.rightAngles.forEach(i=>{
          const v=verts[i];
          const prev=verts[(i+3)%4],next=verts[(i+1)%4];
          const d1x=prev.x-v.x,d1y=prev.y-v.y,l1=Math.hypot(d1x,d1y)||1;
          const d2x=next.x-v.x,d2y=next.y-v.y,l2=Math.hypot(d2x,d2y)||1;
          const sqSz=10;
          const p1x=v.x+d1x/l1*sqSz,p1y=v.y+d1y/l1*sqSz;
          const p2x=v.x+d2x/l2*sqSz,p2y=v.y+d2y/l2*sqSz;
          const px=p1x+d2x/l2*sqSz,py=p1y+d2y/l2*sqSz;
          s+=`<path d="M ${p1x} ${p1y} L ${px} ${py} L ${p2x} ${p2y}" fill="none" stroke="#AF52DE" stroke-width="1.5"/>`;
        });
      }
      // Parallel markers
      const info=qGetOppositePairs();
      if(info){
        info.pairs.forEach((pair,pi)=>{
          if(qAreParallel(pair[0],pair[1])){
            pair.forEach(seg=>{
              const mx=(seg.a.x+seg.b.x)/2,my=(seg.a.y+seg.b.y)/2;
              const dx=seg.b.x-seg.a.x,dy=seg.b.y-seg.a.y,len=Math.hypot(dx,dy)||1;
              const nx=-dy/len*6,ny=dx/len*6;
              const col=pi===0?'#34C759':'#FF9500';
              s+=`<line x1="${mx-nx*.4+dx/len*3}" y1="${my-ny*.4+dy/len*3}" x2="${mx+nx*.4+dx/len*3}" y2="${my+ny*.4+dy/len*3}" stroke="${col}" stroke-width="2"/>`;
              s+=`<line x1="${mx-nx*.4-dx/len*3}" y1="${my-ny*.4-dy/len*3}" x2="${mx+nx*.4-dx/len*3}" y2="${my+ny*.4-dy/len*3}" stroke="${col}" stroke-width="2"/>`;
            });
          }
        });
      }
      // Equal side markers (tick marks)
      const sideLens=verts.map((v,i)=>{
        const next=verts[(i+1)%4];
        return Math.hypot(next.x-v.x,next.y-v.y);
      });
      // Group sides by equal length
      const groups={};
      sideLens.forEach((len,i)=>{
        const key=Math.round(len);
        if(!groups[key])groups[key]=[];
        groups[key].push(i);
      });
      const tickStyles=Object.values(groups).filter(g=>g.length>=2);
      tickStyles.forEach((group,gi)=>{
        const ticks=gi+1;
        group.forEach(i=>{
          const v=verts[i],next=verts[(i+1)%4];
          const mx=(v.x+next.x)/2,my=(v.y+next.y)/2;
          const dx=next.x-v.x,dy=next.y-v.y,len=Math.hypot(dx,dy)||1;
          const nx=-dy/len*5,ny=dx/len*5;
          for(let t=0;t<ticks;t++){
            const off=(t-(ticks-1)/2)*4;
            const tx=mx+dx/len*off,ty=my+dy/len*off;
            s+=`<line x1="${tx-nx}" y1="${ty-ny}" x2="${tx+nx}" y2="${ty+ny}" stroke="#007AFF" stroke-width="1.5"/>`;
          }
        });
      });
    }
  }
  
  // Points
  qPts.forEach((p,i)=>{
    const sel=i===qSel;
    s+=`<circle cx="${p.x}" cy="${p.y}" r="${sel?8:5}" fill="${sel?'#007AFF':'#FF3B30'}"/>`;
    if(sel)s+=`<circle cx="${p.x}" cy="${p.y}" r="14" fill="none" stroke="#007AFF" stroke-width="1.5" stroke-opacity=".2"/>`;
    // Label vertices
    const labels=['A','B','C','D'];
    if(i<4)s+=`<text x="${p.x+10}" y="${p.y-8}" font-size="10" fill="#007AFF" font-weight="600">${labels[i]}</text>`;
  });
  
  svg.innerHTML=s;
}

function setupQuadGrid(){
  const svg=document.getElementById('svg');if(!svg)return;
  svg.onclick=e=>{
    if(modalOpen)return;
    const pt=toSvgPoint(svg,e.clientX,e.clientY);
    const rawX=pt.x,rawY=pt.y;
    
    // Hit existing point
    const hit=qPts.findIndex(p=>Math.hypot(p.x-rawX,p.y-rawY)<GRID_HIT_RADIUS);
    if(hit>=0){
      if(qSel===-1){qSel=hit;drawQuadGrid();return}
      if(qSel===hit){qSel=-1;drawQuadGrid();return}
      // Connect
      if(!qHasSeg(qPts[qSel],qPts[hit])&&qSegs.length<4){
        qSegs.push({a:{...qPts[qSel]},b:{...qPts[hit]}});
        // Check if quad is complete (4 segs forming a closed loop)
        if(qSegs.length===4){
          const v=qOrderedVertices();
          if(v)qComplete=true;
          else{qSegs.pop();showCFB('ok','Connect to close the shape');qSel=-1;drawQuadGrid();return}
        }
      }
      qSel=-1;drawQuadGrid();
      if(qComplete)setTimeout(()=>detect(),300);
      return;
    }
    
    // Snap to isometric grid
    const snapped=snapToIso(rawX,rawY);
    if(!snapped)return;
    const gx=snapped.x,gy=snapped.y;
    const existIdx=qPts.findIndex(p=>Math.abs(p.x-gx)<1&&Math.abs(p.y-gy)<1);
    if(existIdx>=0){
      if(qSel===-1){qSel=existIdx;drawQuadGrid();return}
      if(qSel===existIdx){qSel=-1;drawQuadGrid();return}
      if(!qHasSeg(qPts[qSel],qPts[existIdx])&&qSegs.length<4){
        qSegs.push({a:{...qPts[qSel]},b:{...qPts[existIdx]}});
        if(qSegs.length===4){
          const v=qOrderedVertices();
          if(v)qComplete=true;
          else{qSegs.pop();qSel=-1;drawQuadGrid();return}
        }
      }
      qSel=-1;drawQuadGrid();
      if(qComplete)setTimeout(()=>detect(),300);
      return;
    }
    
    // New point (max 4)
    if(qPts.length>=4){qSel=-1;drawQuadGrid();return}
    qPts.push({x:gx,y:gy});
    qSel=-1;drawQuadGrid();detect();
  };
}

// ==================== DETECTION ====================
function detect(){
  if(mode==='discovery')detectDisc();else detectMast();
}
function detectDisc(){
  if(curTier==='t1')detectDiscT1();else if(curTier==='t2')detectDiscT2();else if(curTier==='t3')detectDiscT3();else if(curTier==='t4')detectDiscT4();
}
function detectDiscT1(){
  const newDisc=[];
  if(gPts.length>0&&!disc.has('point')){newDisc.push('point')}
  if(gSegs.length>0&&!disc.has('line_segment')){newDisc.push('line_segment')}
  // Ray: one end extended, other not
  if(disc.has('line_segment')&&gSegs.some(s=>(s.extA&&!s.extB)||(s.extB&&!s.extA))&&!disc.has('ray')){newDisc.push('ray')}
  // Line: both ends extended
  if(disc.has('line_segment')&&gSegs.some(s=>s.extA&&s.extB)&&!disc.has('line')){newDisc.push('line')}
  // Intersection: shared endpoint OR actual crossing
  if(disc.has('line_segment')&&!disc.has('intersection')){
    let found=false;
    // Shared endpoints
    for(let i=0;i<gSegs.length&&!found;i++)for(let j=i+1;j<gSegs.length;j++)if(sameP(gSegs[i].a,gSegs[j].a)||sameP(gSegs[i].a,gSegs[j].b)||sameP(gSegs[i].b,gSegs[j].a)||sameP(gSegs[i].b,gSegs[j].b)){found=true;break}
    // Actual segment crossings
    if(!found){
      for(let i=0;i<gSegs.length&&!found;i++)for(let j=i+1;j<gSegs.length;j++)if(segsIntersect(gSegs[i],gSegs[j])){found=true;break}
    }
    if(found)newDisc.push('intersection');
  }
  // Vertex: two segments sharing an endpoint (same trigger as intersection, but conceptually distinct)
  if(disc.has('line_segment')&&!disc.has('vertex')){
    for(let i=0;i<gSegs.length;i++)for(let j=i+1;j<gSegs.length;j++)if(sameP(gSegs[i].a,gSegs[j].a)||sameP(gSegs[i].a,gSegs[j].b)||sameP(gSegs[i].b,gSegs[j].a)||sameP(gSegs[i].b,gSegs[j].b)){newDisc.push('vertex');i=999;break}
  }
  // Parallel
  if(disc.has('line_segment')&&!disc.has('parallel')){
    for(let i=0;i<gSegs.length;i++)for(let j=i+1;j<gSegs.length;j++){const d1=segDir(gSegs[i]),d2=segDir(gSegs[j]);if(d1.ux===d2.ux&&d1.uy===d2.uy){newDisc.push('parallel');i=999;break}}
  }
  // Perpendicular
  if(disc.has('line_segment')&&!disc.has('perpendicular')){
    for(let i=0;i<gSegs.length;i++)for(let j=i+1;j<gSegs.length;j++){const d1=segDir(gSegs[i]),d2=segDir(gSegs[j]);if(d1.ux*d2.ux+d1.uy*d2.uy===0){newDisc.push('perpendicular');i=999;break}}
  }

  // Process discoveries: show first, queue rest
  if(newDisc.length>0){
    newDisc.forEach(id=>disc.add(id));
    if(modalOpen){
      discQueue.push(...newDisc);
    }else{
      showTeachCel(newDisc[0]);
      if(newDisc.length>1) discQueue.push(...newDisc.slice(1));
    }
    renderDex();updProg();renderComp();
  }
}
function detectDiscT2(){
  const newDisc=[];
  // Degree discovered when first angle is measured
  if(protRays.length>=2&&!disc.has('degree'))newDisc.push('degree');
  if(protRays.length>=2&&!disc.has('angle'))newDisc.push('angle');
  if(protRays.length>=2){
    const deg=protAngle();
    if(deg>1&&deg<88&&!disc.has('acute_angle'))newDisc.push('acute_angle');
    if(deg>=88&&deg<=92&&!disc.has('right_angle'))newDisc.push('right_angle');
    if(deg>92&&deg<179&&!disc.has('obtuse_angle'))newDisc.push('obtuse_angle');
  }
  if(newDisc.length>0){
    newDisc.forEach(id=>disc.add(id));
    if(modalOpen){discQueue.push(...newDisc)}
    else{showTeachCel(newDisc[0]);if(newDisc.length>1)discQueue.push(...newDisc.slice(1))}
    renderDex();updProg();renderComp();
  }
}
function detectDiscT3(){
  if(triAngA===null||triAngB===null)return;
  const a3=180-triAngA-triAngB;
  if(a3<=0)return; // no triangle
  const cls=classifyTri();
  const newDisc=[];
  if(!disc.has('polygon'))newDisc.push('polygon');
  if(!disc.has('triangle'))newDisc.push('triangle');
  if(cls.sides==='equilateral'&&!disc.has('equilateral'))newDisc.push('equilateral');
  if(cls.sides==='isosceles'&&!disc.has('isosceles'))newDisc.push('isosceles');
  if(cls.sides==='scalene'&&!disc.has('scalene'))newDisc.push('scalene');
  if(cls.angles==='right_tri'&&!disc.has('right_triangle'))newDisc.push('right_triangle');
  if(newDisc.length>0){
    newDisc.forEach(id=>disc.add(id));
    if(modalOpen){discQueue.push(...newDisc)}
    else{showTeachCel(newDisc[0]);if(newDisc.length>1)discQueue.push(...newDisc.slice(1))}
    renderDex();updProg();renderComp();
  }
}
function detectDiscT4(){
  if(!qComplete||qSegs.length<4)return;
  const cls=classifyQuad();
  if(!cls.is)return;
  const newDisc=[];
  
  // Layer 1: Always discover quadrilateral first
  if(!disc.has('quadrilateral'))newDisc.push('quadrilateral');
  
  // Layer 2: Trapezoid, Parallelogram, Kite (the three branches)
  if(cls.is.trapezoid&&!disc.has('trapezoid'))newDisc.push('trapezoid');
  if(cls.is.kite&&!disc.has('kite_shape'))newDisc.push('kite_shape');
  if(cls.is.parallelogram&&!disc.has('parallelogram'))newDisc.push('parallelogram');
  
  // Layer 3: Rectangle and Rhombus (children of parallelogram)
  if(cls.is.rectangle&&disc.has('parallelogram')&&!disc.has('rectangle'))newDisc.push('rectangle');
  if(cls.is.rhombus&&disc.has('parallelogram')&&!disc.has('rhombus'))newDisc.push('rhombus');
  
  // Layer 4: Square (child of both rectangle and rhombus)
  if(cls.is.square&&disc.has('rectangle')&&disc.has('rhombus')&&!disc.has('square'))newDisc.push('square');
  
  if(newDisc.length>0){
    newDisc.forEach(id=>disc.add(id));
    if(modalOpen){discQueue.push(...newDisc)}
    else{showTeachCel(newDisc[0]);if(newDisc.length>1)discQueue.push(...newDisc.slice(1))}
    renderDex();updProg();renderComp();
  }
}
function detectMast(){
  if(!mastTgt)return;
  const c=ALL.find(x=>x.id===mastTgt),st=c.mastery[mastStep];
  if(!st||st.type==='quiz')return;
  let ok=false;
  if(st.type==='tri_build'){
    if(triAngA===null||triAngB===null)return;
    const a3=180-triAngA-triAngB;
    if(a3<=0)return;
    const cls=classifyTri();
    switch(st.detect){
      case 'any_tri':ok=true;break;
      case 'equilateral':ok=cls.sides==='equilateral';break;
      case 'isosceles':ok=cls.sides==='isosceles';break;
      case 'scalene':ok=cls.sides==='scalene';break;
      case 'right_tri':ok=cls.angles==='right_tri';break;
    }
  }else if(st.type==='build_quad'){
    if(!qComplete||qSegs.length<4)return;
    const cls=classifyQuad();
    if(!cls.is)return;
    switch(st.detect){
      case 'any_quad':ok=qComplete;break;
      case 'rectangle':ok=cls.is.rectangle;break;
      case 'square':ok=cls.is.square;break;
      case 'parallelogram':ok=cls.is.parallelogram;break;
      case 'rhombus':ok=cls.is.rhombus;break;
      case 'trapezoid':ok=cls.is.trapezoid;break;
      case 'kite':ok=cls.is.kite;break;
    }
  }else if(st.type==='protractor'){
    if(protRays.length<2)return;
    const deg=protAngle();
    switch(st.detect){case 'any_angle':ok=deg>5&&deg<175;break;case 'acute':ok=deg>5&&deg<88;break;case 'right':ok=deg>=88&&deg<=92;break;case 'obtuse':ok=deg>92&&deg<175;break}
  }else{
    switch(st.detect){
      case 'point':ok=gPts.length>0;break;
      case 'segment':ok=gSegs.length>0;break;
      case 'ray':ok=gSegs.some(s=>(s.extA&&!s.extB)||(s.extB&&!s.extA));break;
      case 'line':ok=gSegs.some(s=>s.extA&&s.extB);break;
      case 'intersection':for(let i=0;i<gSegs.length&&!ok;i++)for(let j=i+1;j<gSegs.length;j++){if(sameP(gSegs[i].a,gSegs[j].a)||sameP(gSegs[i].a,gSegs[j].b)||sameP(gSegs[i].b,gSegs[j].a)||sameP(gSegs[i].b,gSegs[j].b)||segsIntersect(gSegs[i],gSegs[j])){ok=true;break}};break;
      case 'vertex_build':for(let i=0;i<gSegs.length&&!ok;i++)for(let j=i+1;j<gSegs.length;j++)if(sameP(gSegs[i].a,gSegs[j].a)||sameP(gSegs[i].a,gSegs[j].b)||sameP(gSegs[i].b,gSegs[j].a)||sameP(gSegs[i].b,gSegs[j].b)){ok=true;break};break;
      case 'parallel':for(let i=0;i<gSegs.length&&!ok;i++)for(let j=i+1;j<gSegs.length;j++){const d1=segDir(gSegs[i]),d2=segDir(gSegs[j]);if(d1.ux===d2.ux&&d1.uy===d2.uy){ok=true;break}};break;
      case 'parallel_match':if(challengeSeg)for(let i=0;i<gSegs.length&&!ok;i++){if(segDir(gSegs[i]).ux===segDir(challengeSeg).ux&&segDir(gSegs[i]).uy===segDir(challengeSeg).uy)ok=true};break;
      case 'perpendicular':for(let i=0;i<gSegs.length&&!ok;i++)for(let j=i+1;j<gSegs.length;j++){const d1=segDir(gSegs[i]),d2=segDir(gSegs[j]);if(d1.ux*d2.ux+d1.uy*d2.uy===0){ok=true;break}};break;
      case 'perp_match':if(challengeSeg)for(let i=0;i<gSegs.length&&!ok;i++){const d1=segDir(gSegs[i]),d2=segDir(challengeSeg);if(d1.ux*d2.ux+d1.uy*d2.uy===0)ok=true};break;
    }
  }
  if(ok){showCFB('ok','Got it!');setTimeout(advMast,800)}
}

function closeTeachAndMaster(id){
  document.getElementById('ov').classList.remove('on');
  modalOpen=false;
  // Process any queued discoveries after a short delay
  setTimeout(()=>{startMast(id)},300);
}

function closeTeachModal(){
  document.getElementById('ov').classList.remove('on');
  modalOpen=false;
  // Process queued discoveries
  setTimeout(processDiscQueue,400);
}

function processDiscQueue(){
  if(discQueue.length>0&&!modalOpen){
    const next=discQueue.shift();
    showTeachCel(next);
  }
}
