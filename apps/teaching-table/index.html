<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Math Things Teaching Table v4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/mathlive/dist/mathlive.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>  <style>
    :root {
      --paper: #f7efdc;
      --ink: #1d1d1f;
      --muted: rgba(29,29,31,.58);
      --line: rgba(35, 56, 96, 0.26);
      --grid: rgba(35, 56, 96, 0.16);
      --button: #fffefa;
      --button-border: #c8c1b0;
      --accent: #2e5894;
      --danger: #9d3a36;
      --shadow: 0 18px 40px rgba(20, 16, 8, 0.32);
      --math-size: 44px;
      --side-width: clamp(190px, 21vw, 285px);

      /* Cabinet body — dark graphite metal */
      --cabinet:        #2a2722;
      --cabinet-edge:   #15120e;
      --cabinet-up:     #3a3530;
      --cabinet-down:   #1c1915;
      --cabinet-rim:    rgba(255,255,255,0.06);

      /* Brushed metal — for buttons, infrastructure */
      --metal-up:       #e8e3d8;
      --metal-mid:      #cbc5b9;
      --metal-down:     #a39d92;
      --metal-edge:     #5a554e;
      --metal-hi:       rgba(255,255,255,0.55);
      --metal-shadow:   rgba(0,0,0,0.30);

      /* Enamel — saturated math-object colors */
      --enamel-blue:    #28528c;
      --enamel-blue-up: #4a78b4;
      --enamel-blue-dn: #173c70;
      --enamel-cream:   #f1d99c;
      --enamel-cream-up:#fbe9b8;
      --enamel-cream-dn:#c9a85e;
      --enamel-rust:    #a8421d;
      --enamel-rust-up: #c25e34;
      --enamel-rust-dn: #6e2a10;
      --enamel-ochre:   #b8893e;
      --enamel-ochre-up:#d4a55c;
      --enamel-ochre-dn:#7d5a1e;
      --enamel-forest:  #2f5d3f;
      --enamel-forest-up:#4a7d5b;
      --enamel-forest-dn:#1c3e26;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Lexend", ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse at 50% -10%, rgba(255, 246, 220, 0.55), transparent 50%),
        radial-gradient(ellipse at 50% 110%, rgba(15, 12, 8, 0.42), transparent 55%),
        linear-gradient(165deg, #d3c8aa 0%, #c7bb9d 38%, #a89c81 100%);
      overflow: hidden;
      letter-spacing: -0.005em;
    }
    .shell {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--side-width);
      gap: 10px;
      padding: max(8px, env(safe-area-inset-top)) 10px max(8px, env(safe-area-inset-bottom));
    }
    .pad-wrap {
      min-height: 0;
      background:
        linear-gradient(180deg, var(--cabinet-up) 0%, var(--cabinet) 50%, var(--cabinet-down) 100%);
      border: 1px solid var(--cabinet-edge);
      border-radius: 24px;
      padding: 10px;
      box-shadow:
        inset 0 1px 0 var(--cabinet-rim),
        inset 0 -1px 0 rgba(0,0,0,0.5),
        0 22px 44px rgba(15, 12, 8, 0.40),
        0 2px 6px rgba(15, 12, 8, 0.30);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #pad-frame {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--cabinet-edge);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.35);
    }
    #pad {
      height: 100%;
      overflow: auto;
      border-radius: 13px;
      border: none;
      background-color: var(--paper);
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(ellipse at 50% 110%, rgba(180, 155, 100, 0.18), transparent 55%);
      padding: 18px;
      scroll-padding-bottom: 80px;
    }
    #pad.lined {
      background-image: linear-gradient(to bottom, transparent 0, transparent 47px, var(--line) 48px);
      background-size: 100% 48px;
    }
    #pad.grid {
      background-image:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .row {
      min-height: calc(var(--math-size) * 1.28);
      margin: 0 0 8px 0;
      padding: 5px 8px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      background: transparent;
      border: 2px solid transparent;
    }
    .row.active {
      background: rgba(255, 242, 179, .42);
      border-color: rgba(215, 182, 81, .52);
    }
    math-field {
      width: 100%;
      min-height: calc(var(--math-size) * 1.12);
      border: 0;
      outline: none;
      background: transparent;
      font-size: var(--math-size);
      --caret-color: #1b4f9b;
      --selection-background-color: rgba(74, 130, 210, .25);
      --contains-highlight-background-color: transparent;
    }
    math-field::part(menu-toggle),
    math-field::part(virtual-keyboard-toggle) { display: none; }

    .side {
      min-height: 0;
      overflow: auto;
      background:
        linear-gradient(180deg, var(--cabinet-up) 0%, var(--cabinet) 50%, var(--cabinet-down) 100%);
      border: 1px solid var(--cabinet-edge);
      border-radius: 24px;
      box-shadow:
        inset 0 1px 0 var(--cabinet-rim),
        inset 0 -1px 0 rgba(0,0,0,0.45),
        0 22px 44px rgba(15, 12, 8, 0.40),
        0 2px 6px rgba(15, 12, 8, 0.30);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 0;
      line-height: .94;
      padding: 4px 3px 7px;
      user-select: none;
    }
    .brand .math-things {
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -0.055em;
      color: #f0e8d6;
      text-shadow: 0 1px 0 rgba(0,0,0,0.4);
    }
    .brand .pad-name {
      font-size: 15px;
      font-weight: 700;
      color: rgba(240, 232, 214, 0.55);
      letter-spacing: -0.025em;
    }
    .tools.paper-modes {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }
    .keys {
      display: grid;
      gap: 7px;
      align-content: start;
    }
    .keys.digit-pad { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .keys.op-pad { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .keys.edit-pad { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .utility {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin-top: 4px;
    }
    button {
      border: 1px solid var(--metal-edge);
      background:
        linear-gradient(180deg, var(--metal-up) 0%, var(--metal-mid) 55%, var(--metal-down) 100%),
        repeating-linear-gradient(90deg, transparent 0, transparent 1px, rgba(255,255,255,0.04) 1px, rgba(255,255,255,0.04) 2px);
      color: #1d1d1f;
      border-radius: 11px;
      min-height: 42px;
      height: 42px;
      font: inherit;
      font-family: inherit;
      font-size: 20px;
      font-weight: 700;
      box-shadow:
        inset 0 1px 0 var(--metal-hi),
        inset 0 -1px 0 rgba(0,0,0,0.20),
        0 2px 0 rgba(0,0,0,0.40),
        0 4px 8px rgba(0,0,0,0.22);
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding: 0 4px;
      display: inline-grid;
      place-items: center;
      text-shadow: 0 1px 0 rgba(255,255,255,0.42);
    }
    button:active {
      transform: translateY(2px);
      box-shadow:
        inset 0 1px 0 var(--metal-hi),
        inset 0 -1px 0 rgba(0,0,0,0.20),
        0 0 0 rgba(0,0,0,0.40),
        0 1px 3px rgba(0,0,0,0.22);
    }
    button.accent { color: var(--accent); }
    button.danger { color: var(--danger); text-shadow: 0 1px 0 rgba(255,255,255,0.42); }
    button.small { font-size: 16px; }
    button.is-on {
      background:
        linear-gradient(180deg, var(--enamel-cream-up) 0%, var(--enamel-cream) 55%, var(--enamel-cream-dn) 100%);
      border-color: #6a4f1a;
      color: #3a2810;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        inset 0 -1px 0 rgba(0,0,0,0.22),
        0 2px 0 rgba(50, 38, 14, 0.55),
        0 4px 9px rgba(50, 38, 14, 0.28);
    }
    button.is-on:active {
      transform: translateY(2px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        inset 0 -1px 0 rgba(0,0,0,0.22),
        0 0 0 rgba(50, 38, 14, 0.55),
        0 1px 3px rgba(50, 38, 14, 0.28);
    }
    .fraction-icon {
      display: inline-grid;
      grid-template-rows: 1fr 2px 1fr;
      align-items: center;
      justify-items: center;
      width: 32px;
      height: 32px;
      line-height: 1;
      font-size: 14px;
      font-weight: 800;
      font-style: italic;
    }
    .fraction-icon .bar { width: 26px; height: 2.5px; background: currentColor; border-radius: 3px; }
    .frac-key {
      background:
        linear-gradient(180deg, var(--enamel-blue-up) 0%, var(--enamel-blue) 55%, var(--enamel-blue-dn) 100%) !important;
      border-color: #0d2347 !important;
      color: #ffffff !important;
      text-shadow: 0 1px 0 rgba(0,0,0,0.35) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.42),
        inset 0 -1px 0 rgba(0,0,0,0.30),
        0 2px 0 rgba(10, 24, 50, 0.55),
        0 4px 10px rgba(10, 24, 50, 0.32) !important;
    }
    .frac-key:active {
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.42),
        inset 0 -1px 0 rgba(0,0,0,0.30),
        0 0 0 rgba(10, 24, 50, 0.55),
        0 1px 3px rgba(10, 24, 50, 0.32) !important;
    }
    .glyph {
      font-size: 22px;
      font-weight: 800;
      color: rgba(20, 16, 10, 0.78);
    }
    .util {
      min-height: 34px;
      height: 34px;
      font-size: 14px;
      border-radius: 9px;
    }
    .paper-icon {
      display: inline-block;
      width: 21px;
      height: 25px;
      border: 2px solid currentColor;
      border-radius: 4px;
      opacity: .9;
      position: relative;
    }
    .paper-icon.lined::before {
      content: "";
      position: absolute;
      left: 4px; right: 4px; top: 6px; height: 2px;
      background: currentColor;
      box-shadow: 0 6px 0 currentColor, 0 12px 0 currentColor;
    }
    .paper-icon.grid {
      background-image:
        linear-gradient(to right, currentColor 1px, transparent 1px),
        linear-gradient(to bottom, currentColor 1px, transparent 1px);
      background-size: 7px 7px;
      background-position: 3px 3px;
    }
    .trash-icon {
      display: inline-block;
      width: 21px;
      height: 23px;
      border: 2px solid currentColor;
      border-top: 0;
      border-radius: 0 0 5px 5px;
      position: relative;
      margin-top: 6px;
    }
    .trash-icon::before {
      content: "";
      position: absolute;
      left: -3px; right: -3px; top: -7px; height: 3px;
      background: currentColor;
      border-radius: 3px;
    }
    .trash-icon::after {
      content: "";
      position: absolute;
      left: 7px; top: -12px; width: 7px; height: 4px;
      border: 2px solid currentColor;
      border-bottom: 0;
      border-radius: 4px 4px 0 0;
    }


    .algorithms {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }
    .alg-btn {
      min-height: 58px;
      height: 58px;
      padding: 6px 4px 8px;
      font-size: 18px;
      line-height: 1;
      background:
        linear-gradient(180deg, var(--enamel-rust-up) 0%, var(--enamel-rust) 55%, var(--enamel-rust-dn) 100%) !important;
      border-color: #4a1a08 !important;
      color: #ffffff !important;
      text-shadow: 0 1px 0 rgba(0,0,0,0.4) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -1px 0 rgba(0,0,0,0.30),
        0 2px 0 rgba(50, 16, 6, 0.65),
        0 5px 11px rgba(50, 16, 6, 0.36) !important;
    }
    .alg-btn:active {
      transform: translateY(2px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.35),
        inset 0 -1px 0 rgba(0,0,0,0.30),
        0 0 0 rgba(50, 16, 6, 0.65),
        0 1px 3px rgba(50, 16, 6, 0.36) !important;
    }
    .alg-symbol {
      position: relative;
      display: inline-block;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      padding: 2px 6px 10px;
    }
    .alg-symbol::after {
      content: "";
      position: absolute;
      left: 6%;
      right: 6%;
      bottom: 2px;
      height: 3px;
      background: currentColor;
      opacity: 0.85;
      border-radius: 1px;
    }
    .alg-symbol-div {
      font-size: 32px;
      padding: 0 4px;
    }
    .alg-symbol-div::after { display: none; }
    .algo-block {
      display: inline-block;
      margin: 10px 0 16px 8px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 242, 179, .22);
      border: 2px solid transparent;
      vertical-align: top;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-weight: 850;
      font-size: calc(var(--math-size) * .72);
      color: var(--ink);
    }
    .algo-block.active { border-color: rgba(215, 182, 81, .62); }
    .algo-row {
      display: grid;
      grid-template-columns: 1.1em repeat(5, 1.05em);
      gap: .12em;
      align-items: center;
      justify-content: end;
      min-height: 1.25em;
    }
    .algo-row.answer, .algo-row.partial { border-top: .075em solid currentColor; margin-top: .1em; padding-top: .1em; }
    .algo-row.carry {
      min-height: .86em;
      font-size: .58em;
      opacity: .82;
      margin-bottom: -.12em;
    }
    .algo-row.carry .digit-cell {
      min-height: .92em;
      min-width: 1.05em;
      border-radius: .2em;
      box-shadow: inset 0 -0.04em 0 rgba(0,0,0,.16);
    }
    .algo-row.borrow .digit-cell {
      color: var(--danger);
    }
    .opcell { text-align: center; opacity: .95; }
    .digit-cell {
      min-width: 1.05em;
      min-height: 1.18em;
      display: inline-grid;
      place-items: center;
      border-radius: .18em;
      outline: none;
      background: rgba(255,255,255,.08);
    }
    .digit-cell.active {
      background: rgba(54, 95, 157, .16);
      box-shadow: inset 0 -0.08em 0 #365f9d;
    }
    .longdiv-block { min-width: 10em; }
    .longdiv-quotient {
      display: grid;
      grid-template-columns: 2.5em repeat(5, 1.05em);
      gap: .12em;
      margin-left: .35em;
      margin-bottom: .08em;
    }
    .longdiv-main {
      display: grid;
      grid-template-columns: 2.4em repeat(5, 1.05em);
      gap: .12em;
      align-items: stretch;
    }
    .divisor-cells { display: grid; grid-template-columns: repeat(2, 1.05em); gap: .12em; align-items: center; }
    .dividend-cells {
      grid-column: 2 / span 5;
      display: grid;
      grid-template-columns: repeat(5, 1.05em);
      gap: .12em;
      border-top: .075em solid currentColor;
      border-left: .075em solid currentColor;
      border-radius: .16em 0 0 0;
      padding-left: .18em;
    }
    .work-row {
      display: grid;
      grid-template-columns: 2.5em repeat(5, 1.05em);
      gap: .12em;
      min-height: 1.25em;
      margin-left: .35em;
    }

    /* ----- Teaching Table additions ----- */
    #pad { position: relative; }
    #stage {
      position: relative;
      min-height: 100%;
    }
    #worksheet-img {
      display: block;
      width: 100%;
      height: auto;
      max-width: none;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      border-radius: 6px;
      margin: 0 0 14px 0;
      box-shadow: 0 1px 0 rgba(0,0,0,.06);
    }
    #worksheet-img.hidden { display: none; }
    #pad.worksheet { background-image: none; }
    #pad.worksheet #stage { cursor: crosshair; }
    #pad.worksheet #stage .row, #pad.worksheet #stage .algo-holder { cursor: default; }

    .row { position: relative; }
    .row.positioned {
      position: absolute;
      margin: 0;
      padding: 3px 8px 3px 22px;
      background: transparent;
      border: 1.5px solid transparent;
      border-radius: 12px;
      box-shadow: none;
      z-index: 10;
      max-width: 90%;
      min-width: 130px;
      width: max-content;
      transition: background-color 130ms ease, border-color 130ms ease, box-shadow 130ms ease;
    }
    .row.positioned math-field {
      width: auto;
      min-width: 110px;
    }
    .row.positioned:hover {
      background: rgba(255, 253, 247, 0.62);
      border-color: rgba(150, 140, 120, 0.28);
    }
    .row.positioned.active {
      background: rgba(255, 245, 200, 0.94);
      border-color: rgba(215, 182, 81, 0.72);
      box-shadow: 0 5px 14px rgba(40, 34, 24, 0.14);
      z-index: 20;
    }
    .row-grip {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 22px;
      display: none;
      cursor: grab;
      touch-action: none;
      border-radius: 12px 0 0 12px;
      opacity: 0;
      transition: opacity 130ms ease;
    }
    .row-grip::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 18px;
      background-image: radial-gradient(circle, rgba(40,34,24,0.55) 1.2px, transparent 1.4px);
      background-size: 4px 5px;
      background-repeat: repeat-y;
    }
    .row.positioned .row-grip { display: block; }
    .row.positioned:hover .row-grip,
    .row.positioned.active .row-grip { opacity: 1; }
    .row-grip:active { cursor: grabbing; }

    .algo-holder { position: relative; }
    .algo-holder.positioned {
      position: absolute;
      z-index: 10;
      transition: filter 130ms ease;
    }
    .algo-holder.positioned .algo-block {
      margin: 0;
      padding-left: 30px;
      background: rgba(255, 253, 247, 0.0);
      border: 1.5px solid transparent;
      border-radius: 14px;
      box-shadow: none;
      transition: background-color 130ms ease, border-color 130ms ease, box-shadow 130ms ease;
    }
    .algo-holder.positioned:hover .algo-block {
      background: rgba(255, 253, 247, 0.7);
      border-color: rgba(150, 140, 120, 0.28);
    }
    .algo-holder.positioned.active .algo-block {
      background: rgba(255, 245, 200, 0.94);
      border-color: rgba(215, 182, 81, 0.72);
      box-shadow: 0 5px 14px rgba(40, 34, 24, 0.14);
      z-index: 20;
    }
    .algo-grip {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 24px;
      display: none;
      cursor: grab;
      touch-action: none;
      border-radius: 12px 0 0 12px;
      opacity: 0;
      transition: opacity 130ms ease;
      z-index: 30;
    }
    .algo-grip::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 22px;
      background-image: radial-gradient(circle, rgba(40,34,24,0.55) 1.2px, transparent 1.4px);
      background-size: 4px 5px;
      background-repeat: repeat-y;
    }
    .algo-holder.positioned .algo-grip { display: block; }
    .algo-holder.positioned:hover .algo-grip,
    .algo-holder.positioned.active .algo-grip { opacity: 1; }
    .algo-grip:active { cursor: grabbing; }

    /* Worksheet upload icon */
    .worksheet-icon {
      display: inline-block;
      width: 21px;
      height: 25px;
      border: 2px solid currentColor;
      border-radius: 4px;
      opacity: .9;
      position: relative;
    }
    .worksheet-icon::before {
      content: "";
      position: absolute;
      left: 3px; right: 3px; top: 5px;
      height: 2px;
      background: currentColor;
      box-shadow: 0 4px 0 currentColor, 0 8px 0 currentColor, 0 12px 0 currentColor;
      opacity: .85;
    }
    .worksheet-icon::after {
      content: "";
      position: absolute;
      top: -3px; right: -3px;
      width: 8px; height: 8px;
      background: var(--metal-mid);
      border: 2px solid currentColor;
      border-radius: 50%;
    }

    /* Drop zone overlay */
    #drop-overlay {
      position: fixed;
      inset: 0;
      background: rgba(54, 95, 157, 0.18);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      pointer-events: none;
    }

  <div class="shell">
    <main class="pad-wrap">

      </div>

        <button id="linedBtn" aria-label="lined paper"><span class="paper-icon lined"></span></button>

    <div class="modal-card">
