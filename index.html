<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Things. | Curriculum Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-center: #F5F5F7; --bg-edge: #D1D1D6; --alum-base: #E8E9ED; --surface: #FFFFFF;
            --text-main: #1D1D1F; --text-gray: #7A7D8A; --text-light: #AEAEB2;
            --strand-system: #7B00FF; --strand-sense: #DC143C; --strand-basic: #4CBB17; --strand-advanced: #FF9F0A;
            --dom-cc: #FF9F0A; --dom-nbt: #0A84FF; --dom-oa: #FF375F; --dom-nf: #30D158; --dom-md: #BF5AF2; --dom-g: #5E5CE6;
            --brand-k: #64D2FF; --brand-g1: #DC143C; --brand-g2: #4169E1; --brand-g3: #FFD700; --brand-g4: #4CBB17; --brand-g5: #CF3476;
            --raised: 12px 12px 24px rgba(166, 171, 189, 0.4), -12px -12px 24px rgba(255, 255, 255, 0.9);
            --milled: inset 3px 3px 6px rgba(166, 171, 189, 0.9), inset -3px -3px 6px rgba(255, 255, 255, 1);
            --glass: rgba(245, 245, 247, 0.85);
            --hub-raised: 16px 16px 32px rgba(166, 171, 189, 0.4), -16px -16px 32px rgba(255, 255, 255, 0.9);
            --hub-depressed: inset 6px 6px 16px rgba(0, 0, 0, 0.25), inset -6px -6px 16px rgba(255, 255, 255, 0.6);
            --scale: 1;
        }

        @media (max-width: 1400px) { :root { --scale: 0.85; } }
        @media (max-width: 1000px) { :root { --scale: 0.65; } }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Lexend', sans-serif; background: radial-gradient(circle at 50% 50%, var(--bg-center) 0%, var(--bg-edge) 150%); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

        main { flex: 1; position: relative; }
        .view { position: absolute; inset: 0; padding: 40px 24px; transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0; pointer-events: none; transform: scale(0.95); overflow-y: auto; scrollbar-width: none; }
        .view.active { opacity: 1; pointer-events: auto; transform: scale(1); z-index: 10; }
        #view-braid { padding: 0; display: flex; flex-direction: column; overflow: hidden; }

        /* HUB COMPONENTS */
        .gallery-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; min-height: 800px; min-width: 1200px; }
        .hub-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; width: calc(280px * var(--scale)); height: calc(280px * var(--scale)); border-radius: 50%; background: linear-gradient(135deg, #fdfdfd 0%, #d0d0d5 100%); box-shadow: 0 24px 48px rgba(0,0,0,0.25); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center; }
        .hub-center-title { font-weight: 900; font-size: calc(2.6rem * var(--scale)); letter-spacing: -0.05em; color: #2D2D35; }

        .node-assembly { position: absolute; top: 50%; left: 50%; }
        .domain-plate { position: absolute; background: linear-gradient(135deg, #f4f4f6 0%, #cbccd2 100%); box-shadow: var(--hub-raised); border-radius: calc(32px * var(--scale)); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transform: rotate(var(--angle)) translateY(calc((var(--radius) * var(--scale)) * -1)) rotate(calc(var(--angle) * -1)) translate(-50%, -50%); }

        /* BRAID HEADER */
        header { flex-shrink: 0; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; background: var(--glass); backdrop-filter: blur(20px); z-index: 200; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .domain-nav { display: flex; background: var(--alum-base); padding: 4px; border-radius: 12px; box-shadow: var(--milled); gap: 4px; }
        .domain-btn { border: none; background: transparent; padding: 8px 16px; border-radius: 8px; font-weight: 800; font-size: 0.65rem; cursor: pointer; }
        .domain-btn.active { background: #E0E0E5; box-shadow: var(--milled); color: var(--text-main); }

        /* MATRIX GRID */
        .dashboard-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        .map-zone { flex: 1; height: 100%; overflow: auto; padding: 20px 40px 240px 20px; }
        .matrix-grid { display: grid; grid-template-columns: 80px repeat(4, minmax(260px, 1fr)); gap: 40px 24px; position: relative; width: 100%; max-width: 1500px; margin: 0 auto; }
        .grade-marker { grid-column: 1; padding: 16px 20px; border-radius: 20px; font-weight: 900; font-size: 1.8rem; color: var(--text-gray); cursor: pointer; background: transparent; border: none; box-shadow: var(--raised); }
        .hidden-row { display: none !important; }

        /* APP DECK (DRAGGABLE/TUCKABLE) */
        .tool-deck { 
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) translateY(0); 
            width: calc(100% - 80px); max-width: 1400px; height: 180px; 
            background: rgba(245, 245, 247, 0.7); backdrop-filter: blur(40px); 
            border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); 
            border: 1px solid rgba(255,255,255,0.4); border-bottom: none;
            display: flex; align-items: center; padding: 0 24px; gap: 16px; z-index: 500; 
            overflow-x: auto; scrollbar-width: none;
        }
        
        /* Tactical Handle */
        .deck-handle {
            position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 6px; border-radius: 3px;
            background: linear-gradient(to bottom, #d1d1d6, #8e8e93);
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.5), 0 1px 2px rgba(0,0,0,0.2);
            cursor: pointer; transition: background 0.2s;
        }
        .deck-handle:hover { background: linear-gradient(to bottom, #e5e5ea, #aeaeb2); }

        .app-card { flex: 0 0 auto; width: 140px; height: 140px; background: var(--alum-base); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--raised); cursor: pointer; transition: 0.3s; }
        .app-card:hover { transform: translateY(-5px); }
        .tool-bead { width: 16px; height: 16px; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.22); }
        .app-title { font-size: 0.85rem; font-weight: 800; color: var(--text-main); }

        /* EXPANDED MODAL */
        .plate-backdrop { position: fixed; inset: 0; z-index: 1000; background: rgba(245, 245, 247, 0.4); backdrop-filter: blur(12px); opacity: 0; pointer-events: none; transition: 0.5s; }
        .plate-backdrop.active { opacity: 1; pointer-events: auto; }
        .expanded-plate { position: fixed; z-index: 1001; background: linear-gradient(135deg, #fdfdfd 0%, #e8e9ed 100%); border-radius: 24px; box-shadow: 0 40px 80px rgba(0,0,0,0.2); opacity: 0; pointer-events: none; display: flex; flex-direction: column; overflow: hidden; }
        .expanded-plate.active { top: 5vh !important; left: 10vw !important; width: 80vw !important; height: 90vh !important; opacity: 1; pointer-events: auto; }
        .hardware-btn { padding: 12px 24px; border-radius: 20px; font-weight: 800; cursor: pointer; border: none; background: var(--alum-base); box-shadow: var(--hub-raised); text-transform: uppercase; }
        .hardware-btn.primary { background: var(--text-main); color: #fff; width: 100%; }
    </style>
    <script src="coi-serviceworker.js"></script>
</head>
<body>

    <main>
        <div class="view active" id="view-hub">
            <div class="gallery-wrapper">
                <div class="ambient-glow"></div>
                <div class="node-assembly" style="--angle: 305deg; --radius: 500px;"><div class="domain-plate plate-oa" onclick="openBraid('oa')"><div class="plate-acronym">OA</div><div class="plate-title">Algebra</div></div></div>
                <div class="node-assembly" style="--angle: 265deg; --radius: 360px;"><div class="domain-plate plate-cc" onclick="openBraid('cc')"><div class="plate-acronym">CC</div><div class="plate-title">Counting</div></div></div>
                <div class="node-assembly" style="--angle: 220deg; --radius: 440px;"><div class="domain-plate plate-g" onclick="openBraid('g')"><div class="plate-acronym">G</div><div class="plate-title">Geometry</div></div></div>
                <div class="node-assembly" style="--angle: 60deg; --radius: 480px;"><div class="domain-plate plate-nbt" onclick="openBraid('nbt')"><div class="plate-acronym">NBT</div><div class="plate-title">Base Ten</div></div></div>
                <div class="node-assembly" style="--angle: 105deg; --radius: 420px;"><div class="domain-plate plate-nf" onclick="openBraid('nf')"><div class="plate-acronym">NF</div><div class="plate-title">Fractions</div></div></div>
                <div class="node-assembly" style="--angle: 145deg; --radius: 400px;"><div class="domain-plate plate-md" onclick="openBraid('md')"><div class="plate-acronym">MD</div><div class="plate-title">Measurement</div></div></div>
                <div class="hub-center" onclick="openView('view-mission')"><div class="hub-center-title">Math Things.</div></div>
            </div>
        </div>

        <div class="view" id="view-mission">
            <div style="max-width: 800px; margin: 0 auto; padding-top: 100px;">
                <button class="hardware-btn" onclick="openView('view-hub', true)">← Back to Hub</button>
                <h1 style="font-size: 3.5rem; font-weight: 900; margin: 20px 0;">Math, in your hands.</h1>
                <div style="background: var(--alum-base); padding: 48px; border-radius: 32px; box-shadow: var(--hub-depressed); text-align: center;">
                    <h2>Zero Instructions. Total Intuition.</h2>
                    <p style="font-size: 1.25rem; line-height: 1.6; margin-top: 24px;">Mathematics is a physical reality. Our tools enforce a "No Words, No Directions" policy. The interface dictates the math.</p>
                </div>
            </div>
        </div>

        <div class="view" id="view-braid">
            <header>
                <div class="brand-logo-nav" onclick="openView('view-hub', true)">MATH THINGS.</div>
                <nav class="domain-nav">
                    <button class="domain-btn" data-dom-target="cc" onclick="toggleFilter('domain', 'cc', this)">CC</button>
                    <button class="domain-btn" data-dom-target="nbt" onclick="toggleFilter('domain', 'nbt', this)">NBT</button>
                    <button class="domain-btn" data-dom-target="oa" onclick="toggleFilter('domain', 'oa', this)">OA</button>
                    <button class="domain-btn" data-dom-target="nf" onclick="toggleFilter('domain', 'nf', this)">NF</button>
                    <button class="domain-btn" data-dom-target="md" onclick="toggleFilter('domain', 'md', this)">MD</button>
                    <button class="domain-btn" data-dom-target="g" onclick="toggleFilter('domain', 'g', this)">G</button>
                </nav>
            </header>

            <div class="dashboard-body">
                <div class="map-zone" id="mapZone">
                    <div class="matrix-grid" id="matrixGrid"></div>
                </div>
                <div class="tool-deck" id="toolDeck">
                    <div class="deck-handle" id="deckHandle"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="plate-backdrop" id="plateBackdrop" onclick="closePlate()"></div>
    <div class="expanded-plate" id="expandedPlate">
        <button onclick="closePlate()" style="position: absolute; top: 24px; right: 24px; font-size: 2rem; background: none; border: none; cursor: pointer;">×</button>
        <div style="padding: 40px; border-bottom: 1px solid rgba(0,0,0,0.05);">
            <div id="ep-title" style="font-size: 2.5rem; font-weight: 900;"></div>
            <div id="ep-desc" style="color: var(--text-gray);"></div>
        </div>
        <div class="plate-body">
            <div class="plate-guide" style="padding: 40px; overflow-y: auto;">
                <p id="ep-pedagogy-content" style="line-height: 1.6; font-size: 1.1rem;"></p>
            </div>
            <div class="plate-sandbox" style="width: 400px; background: var(--bg-center); padding: 40px; display: flex; flex-direction: column; align-items: center;">
                <div class="simulated-tablet">
                    <div id="ep-tool-bead" style="width: 40px; height: 40px; border-radius: 50%; margin-bottom: 20px;"></div>
                    <div id="ep-tool-name" style="color: white; font-weight: 800;"></div>
                </div>
                <button class="hardware-btn primary" id="launch-app-btn">Enter Sandbox</button>
            </div>
        </div>
    </div>

    <script>
        let currentView = 'view-hub';
        let currentDomain = 'all';
        let currentGrade = 'all';
        let isDeckTucked = false;

        const appsData = [
            { id: "geo-lab", title: "Geo Lab", strand: "system", grades: ["G3", "G4", "G5"], url: "geo-lab.html" },
            { id: "area-excavator", title: "Area Excavator", strand: "basic", grades: ["G3", "G4", "G5"], url: "area-excavator.html" },
            { id: "array-architect", title: "Array Architect", strand: "advanced", grades: ["G2", "G3", "G4"], url: "array-architect.html" },
            { id: "array-builder", title: "Array Builder", strand: "advanced", grades: ["G2", "G3", "G4"], url: "array-builder.html" },
            { id: "decimal-order", title: "Decimal Order", strand: "basic", grades: ["G4", "G5"], url: "decimal-order.html" },
            { id: "fraction-lab", title: "Fraction Lab", strand: "system", grades: ["G3", "G4", "G5"], url: "fraction-lab.html" },
            { id: "lego-fractions", title: "Lego Fractions", strand: "advanced", grades: ["G3", "G4", "G5"], url: "lego-fractions.html" },
            { id: "long-division-buddy", title: "Long Division Buddy", strand: "advanced", grades: ["G4", "G5"], url: "long-division-buddy.html" },
            { id: "number-bond", title: "Number Bond", strand: "basic", grades: ["K", "G1", "G2"], url: "number-bond.html" },
            { id: "number-line", title: "Number Line", strand: "sense", grades: ["K", "G1", "G2", "G3", "G4", "G5"], url: "number-line.html" },
            { id: "place-value-blocks", title: "Place Value Blocks", strand: "system", grades: ["K", "G1", "G2"], url: "place-value-blocks.html" },
            { id: "place-value-cards", title: "Place Value Cards", strand: "sense", grades: ["K", "G1", "G2", "G3"], url: "place-value-cards.html" },
            { id: "prime-altar", title: "Prime Altar", strand: "system", grades: ["G4", "G5"], url: "prime-altar.html" },
            { id: "rekenrek", title: "Rekenrek", strand: "sense", grades: ["K", "G1", "G2"], url: "rekenrek.html" },
            { id: "rounding-waves", title: "Rounding Waves", strand: "sense", grades: ["G3", "G4"], url: "rounding-waves.html" },
            { id: "sentences", title: "Sentences", strand: "basic", grades: ["K", "G1", "G2"], url: "sentences.html" },
            { id: "ten-frame", title: "Ten Frame", strand: "sense", grades: ["K", "G1"], url: "ten-frame.html" },
            { id: "walker-ellie", title: "Walker Ellie", strand: "basic", grades: ["K", "G1", "G2"], url: "walker-ellie.html" },
            { id: "zooming-number-line", title: "Zooming Number Line", strand: "sense", grades: ["G3", "G4", "G5"], url: "zooming-number-line.html" }
        ];

        // Drawer Tucking with GSAP
        document.getElementById('deckHandle').addEventListener('click', () => {
            isDeckTucked = !isDeckTucked;
            gsap.to('#toolDeck', {
                y: isDeckTucked ? 150 : 0,
                duration: 0.6,
                ease: "elastic.out(1, 0.75)"
            });
        });

        function openView(targetId, isBack = false) {
            document.getElementById(currentView).classList.remove('active');
            document.getElementById(targetId).classList.add('active');
            currentView = targetId;
        }

        function openBraid(domain) {
            currentDomain = domain;
            document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`.domain-btn[data-dom-target="${domain}"]`);
            if (btn) btn.classList.add('active');
            applyFilters(); openView('view-braid');
        }

        function toggleFilter(type, value, btn) {
            if (type === 'domain') {
                currentDomain = btn.classList.contains('active') ? 'all' : value;
                document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('active'));
            } else {
                currentGrade = btn.classList.contains('active') ? 'all' : value;
                document.querySelectorAll('.grade-marker').forEach(b => b.classList.remove('active'));
            }
            if (btn && (currentDomain !== 'all' || currentGrade !== 'all')) btn.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            document.querySelectorAll('.grid-cell, .grade-marker').forEach(el => {
                const row = el.getAttribute('data-row');
                if (currentGrade === 'all' || row === currentGrade) el.classList.remove('hidden-row');
                else el.classList.add('hidden-row');
            });
            renderApps();
        }

        function renderApps() {
            const toolDeck = document.getElementById('toolDeck');
            // Preserve the handle
            const handle = document.getElementById('deckHandle');
            toolDeck.innerHTML = '';
            toolDeck.appendChild(handle);
            
            appsData.forEach(app => {
                const gradeMatch = currentGrade === 'all' || app.grades.includes(currentGrade.toUpperCase());
                toolDeck.insertAdjacentHTML('beforeend', `
                    <a href="${app.url}" style="text-decoration: none;">
                        <div class="app-card ${!gradeMatch ? 'domain-dimmed' : ''}">
                            <div class="tool-bead" style="background: var(--strand-${app.strand});"></div>
                            <div class="app-title">${app.title}</div>
                        </div>
                    </a>
                `);
            });
        }

        function closePlate() {
            document.getElementById('plateBackdrop').classList.remove('active');
            document.getElementById('expandedPlate').classList.remove('active');
            document.getElementById('expandedPlate').style.opacity = '0';
        }

        // Initialize Grid Markers
        const matrixGrid = document.getElementById('matrixGrid');
        ['k', 'g1', 'g2', 'g3', 'g4', 'g5'].forEach((g, i) => {
            matrixGrid.insertAdjacentHTML('beforeend', `
                <button class="grade-marker" data-row="${g}" style="grid-row: ${i+2};" onclick="toggleFilter('grade', '${g}', this)">${g.toUpperCase()}</button>`);
        });

        renderApps();
    </script>
</body>
</html>
