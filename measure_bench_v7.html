<style>

<body>
<header><div class="logo">Math Things<span class="brand-dot"></span></div><div class="page-title">Measure Bench</div><div class="blank"></div></header>
<main class="stage">
  <section class="table" id="table">
    <div class="bench">
      <div class="ctrl-row top-row"><div class="ctrl-inner"><div class="dial-wrap dial-top" id="topDial"><div class="knob"><div class="cap" id="topCap"></div></div></div><div class="readout readout-top"><span class="readout-tag" id="readoutTagTop">A</span><div class="readout-cell top"><span class="swatch"></span><span class="val" id="readoutTop">0 cm</span></div></div></div></div>
      <div class="ruler-band top"><div class="channel"><div class="ruler" id="topRuler"><div class="stop l"></div><div class="stop r"></div></div></div></div>
      <div class="objects" id="objects">
        <div class="thing-row" id="rowA"><div class="thing active" id="thingA" data-key="A"><span class="thing-tag">A</span><div class="edge left"></div><div class="edge right"></div></div></div>
        <div class="thing-row" id="rowB"><div class="thing" id="thingB" data-key="B"><span class="thing-tag">B</span><div class="edge left"></div><div class="edge right"></div></div></div>
        <div class="thing-row hidden" id="rowC"><div class="thing" id="thingC" data-key="C"><span class="thing-tag">C</span><div class="edge left"></div><div class="edge right"></div></div></div>
      </div>
      <div class="ruler-band bottom"><div class="channel"><div class="ruler" id="bottomRuler"><div class="stop l"></div><div class="stop r"></div></div></div></div>
      <div class="ctrl-row bot-row"><div class="ctrl-inner"><div class="dial-wrap dial-bottom" id="bottomDial"><div class="knob"><div class="cap" id="bottomCap"></div></div></div><div class="readout readout-bot"><span class="readout-tag" id="readoutTagBot">A</span><div class="readout-cell bot"><span class="swatch"></span><span class="val" id="readoutBot">0 in</span></div></div></div></div>
      <div class="toggle-row"><div class="toggle-pill object-slider count-2" id="objSlider" role="slider" aria-label="number of objects" aria-valuemin="1" aria-valuemax="3" aria-valuenow="2"><i class="thumb"></i><span class="object-choice one" data-count="1"><i class="mini-object"></i></span><span class="object-choice two" data-count="2"><i class="mini-object"></i><i class="mini-object"></i></span><span class="object-choice three" data-count="3"><i class="mini-object"></i><i class="mini-object"></i><i class="mini-object"></i></span></div><button class="toggle-pill toggle rulers" id="topToggle" aria-label="show two rulers"><span class="ruler-glyph"><i class="mini-ruler blue"></i><i class="mini-ruler red"></i></span></button></div>
    </div>

</main>
<footer>Math Things<span class="footer-dot"></span> &nbsp;|&nbsp; Math, in your hands<span class="footer-dot"></span></footer>
<script>
const BENCH_INCHES=24,MIN=.04,MAX=.98;
const ORDER=['inches','feet','cm','meters','blocks'];
const MODES={
  inches:{label:'in',unit:'IN',inchPer:1,major:1,minor:.25,format:fmtInches},
  feet:{label:'ft',unit:'FT',inchPer:12,major:1,minor:1/12,format:fmtFeet},
  cm:{label:'cm',unit:'CM',inchPer:.3937007874,major:5,minor:1,format:fmtCm},
  meters:{label:'m',unit:'M',inchPer:39.37007874,major:1,minor:.01,format:fmtMeters},
  blocks:{label:'📎',unit:'📎',inchPer:1.25,major:1,minor:1,format:v=>fmtCount(v/1.25,'📎')}

const state={active:'A',top:false,objectCount:2,bottomMode:'inches',topMode:'cm',objects:{A:{left:0,right:.42},B:{left:0,right:.74},C:{left:0,right:.58}}};
const $=id=>document.getElementById(id);
const table=$('table'),objects=$('objects'),thingA=$('thingA'),thingB=$('thingB'),thingC=$('thingC'),rowB=$('rowB'),rowC=$('rowC'),bottomRuler=$('bottomRuler'),topRuler=$('topRuler'),bottomDial=$('bottomDial'),topDial=$('topDial'),bottomCap=$('bottomCap'),topCap=$('topCap'),topToggle=$('topToggle'),objSlider=$('objSlider'),readoutTagBot=$('readoutTagBot'),readoutTagTop=$('readoutTagTop'),readoutBot=$('readoutBot'),readoutTop=$('readoutTop');
const OBJ_COLORS={A:'#DC143C',B:'#4169E1',C:'#E8A02E'};
function gcd(a,b){return b?gcd(b,a%b):a}
function frac(n,d){const g=gcd(n,d);n/=g;d/=g;return {'1/2':'½','1/4':'¼','3/4':'¾','1/8':'⅛','3/8':'⅜','5/8':'⅝','7/8':'⅞'}[n+'/'+d]||`${n}/${d}`}
function fmtInches(inches){const e=Math.round(inches*8),w=Math.floor(e/8),r=e%8;if(!w&&!r)return '0 in';if(!r)return `${w} in`;if(!w)return `${frac(r,8)} in`;return `${w}${frac(r,8)} in`}
function fmtCm(inches){const cm=inches/MODES.cm.inchPer;return Math.abs(cm-Math.round(cm))<.05?`${Math.round(cm)} cm`:`${cm.toFixed(1)} cm`}
function fmtFeet(inches){const eighths=Math.round(inches*8),wholeIn=Math.floor(eighths/8),rem=eighths%8,ft=Math.floor(wholeIn/12),inch=wholeIn%12;if(!rem)return `${ft}′ ${inch}″`;return `${ft}′ ${inch}${frac(rem,8)}″`}
function fmtMeters(inches){const cm=inches/MODES.cm.inchPer;const m=Math.floor(cm/100);const rem=Math.round(cm-m*100);return `${m} m ${rem} cm`}
function fmtCount(v,s){return Math.abs(v-Math.round(v))<.04?`${Math.round(v)} ${s}`:`${v.toFixed(1)} ${s}`}
function pct(v){return `${v*100}%`}
function activeObj(){return state.objects[state.active]}
function lengthInches(){const o=activeObj();return Math.abs(o.right-o.left)*BENCH_INCHES}
function snapFrac(raw){
  // Use the finer (smaller in inches) of active modes so neither readout gets stranded
  const modes=state.top?[state.bottomMode,state.topMode]:[state.bottomMode];
  let inc=Infinity;
  for(const k of modes){const m=MODES[k];inc=Math.min(inc,m.minor*m.inchPer)}
  const inches=Math.round((raw*BENCH_INCHES)/inc)*inc;
  return Math.max(0,Math.min(1,inches/BENCH_INCHES));
}
function buildLabels(dial){const step=360/ORDER.length;ORDER.forEach((u,i)=>{const lab=document.createElement('div');lab.className='label';lab.dataset.mode=u;lab.textContent=MODES[u].label;const a=(-90+i*step)*Math.PI/180;lab.style.left=`${50+47*Math.cos(a)}%`;lab.style.top=`${50+47*Math.sin(a)}%`;dial.appendChild(lab)})}
function clear(r){Array.from(r.querySelectorAll('.tick,.num,.unit')).forEach(n=>n.remove())}
function addTick(r,x,cls,label){const t=document.createElement('div');t.className='tick '+cls;t.style.left=pct(x);r.appendChild(t);if(label!==null){const n=document.createElement('div');n.className='num';n.textContent=label;n.style.left=pct(x);r.appendChild(n)}}
function buildRuler(r,modeKey){clear(r);const m=MODES[modeKey],max=BENCH_INCHES/m.inchPer;for(let val=0;val<=max+.0001;val+=m.minor){const x=(val*m.inchPer)/BENCH_INCHES;if(x<-.001||x>1.001)continue;let cls='minor',label=null;const major=Math.abs(val/m.major-Math.round(val/m.major))<.0001;if(major){cls='major';const n=Math.round(val);if(n===0)label=null;else if(modeKey==='cm')label=n%5===0?n:null;else if(modeKey==='inches')label=n%2===0?n:null;else if(modeKey==='meters')label=val<1?null:n;else label=n}else if((modeKey==='inches'||modeKey==='feet')&&Math.abs(val*2-Math.round(val*2))<.0001){cls='mid'}addTick(r,x,cls,label)}const u=document.createElement('div');u.className='unit';u.textContent=m.unit;r.appendChild(u)}
function markers(){const o=activeObj(),left=Math.min(o.left,o.right),right=Math.max(o.left,o.right);document.documentElement.style.setProperty('--left',pct(left));document.documentElement.style.setProperty('--right',pct(right))}
function renderObjects(){for(const k of ['A','B','C']){const el=k==='A'?thingA:k==='B'?thingB:thingC,o=state.objects[k];const left=Math.min(o.left,o.right),right=Math.max(o.left,o.right);el.style.left=pct(left);el.style.width=pct(right-left);el.classList.toggle('active',state.active===k)}}
function renderDial(dial,cap,mode,cssVar){const idx=ORDER.indexOf(mode);const step=360/ORDER.length;document.documentElement.style.setProperty(cssVar,`${idx*step}deg`);cap.textContent=MODES[mode].label;dial.querySelectorAll('.label').forEach(l=>l.classList.toggle('active',l.dataset.mode===mode))}
function render(){
  if((state.objectCount<2&&state.active==='B')||(state.objectCount<3&&state.active==='C')) state.active='A';
  document.documentElement.style.setProperty('--active-color',OBJ_COLORS[state.active]);
  table.classList.toggle('top-on',state.top);
  document.documentElement.style.setProperty('--top-open',state.top?1:0);
  topToggle.classList.toggle('on',state.top);
  objSlider.classList.toggle('count-1',state.objectCount===1);
  objSlider.classList.toggle('count-2',state.objectCount===2);
  objSlider.classList.toggle('count-3',state.objectCount===3);
  objSlider.setAttribute('aria-valuenow',state.objectCount);
  rowB.classList.toggle('hidden',state.objectCount<2);
  rowC.classList.toggle('hidden',state.objectCount<3);
  markers();
  renderObjects();
  buildRuler(bottomRuler,state.bottomMode);
  buildRuler(topRuler,state.topMode);
  renderDial(bottomDial,bottomCap,state.bottomMode,'--dial-bottom');
  renderDial(topDial,topCap,state.topMode,'--dial-top');
  readoutTagBot.textContent=state.active;
  readoutTagTop.textContent=state.active;
  const len=lengthInches();
  readoutBot.textContent=MODES[state.bottomMode].format(len);
  readoutTop.textContent=MODES[state.topMode].format(len);
}
// --- Audio: soft tick on snap ---
let audioCtx=null;
function ensureAudio(){
  if(audioCtx)return audioCtx;
  try{audioCtx=new (window.AudioContext||window.webkitAudioContext)()}catch(_){audioCtx=null}
  return audioCtx;
}
function tick(){
  const ctx=ensureAudio();if(!ctx)return;
  if(ctx.state==='suspended')ctx.resume();
  const t=ctx.currentTime;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='triangle';o.frequency.setValueAtTime(2200,t);o.frequency.exponentialRampToValueAtTime(900,t+.025);
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.07,t+.003);g.gain.exponentialRampToValueAtTime(.0001,t+.045);
  o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+.06);
}
function setEdge(k,edge,raw){
  const o=state.objects[k];
  const prev=edge==='left'?o.left:o.right;
  let v=snapFrac(raw);
  if(edge==='left'){
    v=Math.max(0,Math.min(o.right-MIN,v));
    v=snapFrac(v);
    o.left=Math.max(0,Math.min(o.right-MIN,v));
  }else{
    v=Math.max(o.left+MIN,Math.min(MAX,v));
    v=snapFrac(v);
    o.right=Math.max(o.left+MIN,Math.min(MAX,v));
  }
  const next=edge==='left'?o.left:o.right;
  if(Math.abs(next-prev)>1e-6)tick();
  render();
}
function moveBody(k,newLeft,newRight){
  const o=state.objects[k];
  const changed=Math.abs(newLeft-o.left)>1e-6;
  o.left=newLeft;o.right=newRight;
  if(changed)tick();
  render();
}
const RESET_WIDTH=4/BENCH_INCHES; // default 4-inch reset
const lastTap={A:0,B:0,C:0};
function setupThing(el,k){
  el.addEventListener('pointerdown',e=>{
    if((k==='B'&&state.objectCount<2)||(k==='C'&&state.objectCount<3))return;
    state.active=k;
    const edgeEl=e.target.closest('.edge');
    const rect=objects.getBoundingClientRect();
    const o=state.objects[k];
    el.setPointerCapture(e.pointerId);
    if(edgeEl){
      const edge=edgeEl.classList.contains('left')?'left':'right';
      el.classList.add('dragging');
      render();
      const move=ev=>{setEdge(k,edge,(ev.clientX-rect.left)/rect.width)};
      const up=ev=>{el.removeEventListener('pointermove',move);el.classList.remove('dragging');try{el.releasePointerCapture(ev.pointerId)}catch(_){}};
      el.addEventListener('pointermove',move);
      el.addEventListener('pointerup',up,{once:true});
    }else{
      // body drag — translate whole object, preserving width
      const tapStart=performance.now();
      const startX=e.clientX;
      const startLeft=Math.min(o.left,o.right);
      const startRight=Math.max(o.left,o.right);
      const width=startRight-startLeft;
      let moved=false;
      el.classList.add('dragging');
      render();
      const move=ev=>{
        if(Math.abs(ev.clientX-startX)>4)moved=true;
        if(!moved)return;
        const dx=(ev.clientX-startX)/rect.width;
        let newLeft=Math.max(0,Math.min(1-width,startLeft+dx));
        newLeft=snapFrac(newLeft);
        newLeft=Math.max(0,Math.min(1-width,newLeft));
        moveBody(k,newLeft,newLeft+width);
      };
      const up=ev=>{
        el.removeEventListener('pointermove',move);
        el.classList.remove('dragging');
        try{el.releasePointerCapture(ev.pointerId)}catch(_){}
        // Detect double-tap (not after a drag)
        const now=performance.now();
        if(!moved && (now-lastTap[k])<350){
          o.left=0;
          o.right=RESET_WIDTH;
          lastTap[k]=0;
          render();
        }else if(!moved){
          lastTap[k]=now;
        }else{
          lastTap[k]=0;
        }
      };
      el.addEventListener('pointermove',move);
      el.addEventListener('pointerup',up,{once:true});
    }
    e.preventDefault();
  });
}
function setupStop(stopEl,band){
  stopEl.addEventListener('pointerdown',e=>{
    const edge=stopEl.classList.contains('r')?'right':'left';
    const rect=objects.getBoundingClientRect();
    const activeEl=document.getElementById('thing'+state.active);
    activeEl&&activeEl.classList.add('dragging');
    stopEl.setPointerCapture(e.pointerId);
    const move=ev=>{setEdge(state.active,edge,(ev.clientX-rect.left)/rect.width)};
    const up=ev=>{
      stopEl.removeEventListener('pointermove',move);
      activeEl&&activeEl.classList.remove('dragging');
      try{stopEl.releasePointerCapture(ev.pointerId)}catch(_){}
    };
    stopEl.addEventListener('pointermove',move);
    stopEl.addEventListener('pointerup',up,{once:true});
    e.preventDefault();
    e.stopPropagation();
  });
}
function angleFromEvent(e,dial){const rect=dial.getBoundingClientRect();return Math.atan2(e.clientY-(rect.top+rect.height/2),e.clientX-(rect.left+rect.width/2))*180/Math.PI}
function nearestMode(deg){let best=0,bestD=999;const step=360/ORDER.length;ORDER.forEach((u,i)=>{const target=-90+i*step;let d=Math.abs(((deg-target+540)%360)-180);if(d<bestD){bestD=d;best=i}});return ORDER[best]}
function setupDial(dial,key){let sx=0,sy=0,moved=false;dial.addEventListener('pointerdown',e=>{dial.setPointerCapture(e.pointerId);sx=e.clientX;sy=e.clientY;moved=false;const move=ev=>{if(Math.hypot(ev.clientX-sx,ev.clientY-sy)>5)moved=true;const m=nearestMode(angleFromEvent(ev,dial));if(m!==state[key]){state[key]=m;snapAllToMode();render()}};const up=ev=>{dial.removeEventListener('pointermove',move);try{dial.releasePointerCapture(ev.pointerId)}catch(_){}if(!moved){const i=(ORDER.indexOf(state[key])+1)%ORDER.length;state[key]=ORDER[i];snapAllToMode();render()}};dial.addEventListener('pointermove',move);dial.addEventListener('pointerup',up,{once:true});e.preventDefault()})}
function snapAllToMode(){for(const k of ['A','B','C']){const o=state.objects[k];let l=snapFrac(o.left),r=snapFrac(o.right);if(r-l<MIN)r=Math.min(MAX,l+MIN);o.left=Math.max(0,Math.min(MAX-MIN,l));o.right=Math.max(o.left+MIN,Math.min(MAX,r))}}
buildLabels(bottomDial);buildLabels(topDial);setupThing(thingA,'A');setupThing(thingB,'B');setupThing(thingC,'C');setupDial(bottomDial,'bottomMode');setupDial(topDial,'topMode');
document.querySelectorAll('.ruler-band .stop').forEach(s=>setupStop(s));
topToggle.addEventListener('click',()=>{state.top=!state.top;render()});
function setObjectCountFromEvent(e){const rect=objSlider.getBoundingClientRect();const x=e.clientX-rect.left;const section=Math.max(0,Math.min(2,Math.floor((x/rect.width)*3)));state.objectCount=section+1;render()}
objSlider.addEventListener('pointerdown',e=>{objSlider.setPointerCapture(e.pointerId);setObjectCountFromEvent(e);const move=ev=>setObjectCountFromEvent(ev);const up=ev=>{objSlider.removeEventListener('pointermove',move);try{objSlider.releasePointerCapture(ev.pointerId)}catch(_){}};objSlider.addEventListener('pointermove',move);objSlider.addEventListener('pointerup',up,{once:true});e.preventDefault()});
document.addEventListener('keydown',e=>{if(e.key==='a'||e.key==='A'){state.active='A';render()}if((e.key==='b'||e.key==='B')&&state.objectCount>=2){state.active='B';render()}if((e.key==='c'||e.key==='C')&&state.objectCount>=3){state.active='C';render()}if(e.key==='t'||e.key==='T'){state.top=!state.top;render()}if(e.key==='r'||e.key==='R'){const o=state.objects[state.active];o.left=0;o.right=RESET_WIDTH;render()}});
window.addEventListener('resize',render);snapAllToMode();render();
</script>
